<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- 背景：ブランドカラーの円 -->
  <circle cx="96" cy="96" r="96" fill="#1a6fc4"/>
  
  <!-- 立体感のあるゴールドスター（右半分を少し暗くして高級感を演出） -->
  <!-- 左半分：明るいゴールド -->
  <path d="M96 30 L118 78 H170 L128 110 L144 160 L96 130 Z" fill="#FFD700"/>
  <!-- 右半分：深みのあるゴールド -->
  <path d="M96 30 L74 78 H22 L64 110 L48 160 L96 130 Z" fill="#FFB800"/>
  
  <!-- 中央のハイライト（さらに輝きを強調） -->
  <path d="M96 30 L105 78 L96 130 L87 78 Z" fill="white" opacity="0.2"/>
</svg>
