<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ジャンル完全適正化ツール（API優先・全件版）</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-right: 10px; }
        #btn-update { background-color: #e74c3c; color: white; border: none; display: none; }
        #log { margin-top: 20px; background: #222; color: #eee; padding: 15px; height: 500px; overflow-y: scroll; font-family: monospace; font-size: 12px; }
        .change { color: #ffff00; }
        .sub-add { color: #00ff00; }
        .no-change { color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📚 ジャンル完全適正化ツール（API優先・全件版）</h2>
        <p>Google Books APIのカテゴリ情報を最大限活用し、大・中・小ジャンルをすべて再計算します。<br>
        既存のデータベースにあるすべての本が対象です。</p>
        
        <button id="btn-check">全データの診断を開始</button>
        <button id="btn-update">変更を反映する</button>

        <div id="log">ログ待機中...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, writeBatch, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8NPDFZcumM96ypgJOLSm5BA0I2wTBaKg",
            authDomain: "book-ree.firebaseapp.com",
            projectId: "book-ree",
            storageBucket: "book-ree.firebasestorage.app",
            messagingSenderId: "721168073032",
            appId: "1:721168073032:web:9d46233bd8b0d11b73f37d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let pendingUpdates = [];

        /* =========================================
           究極のジャンル判定ロジック (API優先)
           ========================================= */
        
        // APIの英語カテゴリから小ジャンルへのマッピング
        const API_SUBGENRE_MAP = {
            "mystery": "mystery", "detective": "mystery", "crime": "mystery",
            "fantasy": "fantasy", "magic": "fantasy",
            "science fiction": "sf", "space": "sf",
            "history": "history", "historical": "history",
            "business": "management", "economics": "management", "management": "management",
            "finance": "finance", "investment": "finance",
            "health": "health", "fitness": "health",
            "medical": "medical", "medicine": "medical",
            "technology": "science_tech", "engineering": "science_tech", "computer": "science_tech",
            "art": "art", "design": "art",
            "language": "language", "education": "education",
            "mathematics": "math",
            "science": "science", "physics": "science", "chemistry": "science", "biology": "science",
            "psychology": "humanities", "philosophy": "humanities",
            "comics": "manga", "manga": "manga", "graphic novels": "manga"
        };

        // 日本語キーワードによるターゲット（中ジャンル）補完
        const TARGET_KEYWORDS = {
            "university": ["大学", "学部", "卒", "資格", "専門", "キャンパス"],
            "highschool": ["高校", "大学受験", "共通テスト", "青春"],
            "juniorhigh": ["中学", "高校入試", "中学生"],
            "elementary": ["小学", "中学入試", "児童", "こども"],
            "toddler": ["幼児", "絵本", "読み聞かせ"]
        };

        function analyzeBookStructure(info) {
            // 1. データの正規化
            const apiCats = (info.categories || []).join(" ").toLowerCase();
            const fullText = JSON.stringify([
                info.title || "", 
                info.categories || [], 
                info.description || ""
            ]).toLowerCase();

            // 結果格納用
            let main = "other";
            let targets = new Set();
            let subs = new Set();

            // --- A. 大ジャンル判定（APIカテゴリ最優先） ---
            
            // 1. 児童書 (Juvenile)
            if (apiCats.includes("juvenile")) {
                main = "children";
                // ターゲットも自動的に子供寄りに
                if (fullText.includes("young adult")) targets.add("highschool");
                else targets.add("elementary");
            }
            // 2. 文芸 (Fiction / Literature)
            else if (apiCats.includes("fiction") || apiCats.includes("literature")) {
                main = "literature";
            }
            // 3. 漫画 (Comics) -> 今回は文芸扱いとするか、Hobbyとするかは運用次第ですが、一旦Literatureへ
            else if (apiCats.includes("comics") || apiCats.includes("manga")) {
                main = "literature"; 
                subs.add("study_manga"); // 便宜上
            }
            // 4. ビジネス (Business / Economics)
            else if (apiCats.includes("business") || apiCats.includes("economics")) {
                main = "business";
            }
            // 5. 学習 (Study Aids / Education)
            else if (apiCats.includes("study aids") || apiCats.includes("education")) {
                main = "study";
            }
            // 6. 専門書 (Science / Tech / Medical / Law)
            else if (apiCats.includes("science") || apiCats.includes("technology") || apiCats.includes("computer") || apiCats.includes("medical") || apiCats.includes("law")) {
                main = "specialized";
            }
            // 7. 趣味実用 (Cooking / Travel / Health / Art)
            else if (apiCats.includes("cooking") || apiCats.includes("travel") || apiCats.includes("health") || apiCats.includes("art") || apiCats.includes("crafts")) {
                main = "hobby";
            }
            
            // --- B. 大ジャンル判定（フォールバック：APIが不明な場合のみキーワードで補完） ---
            if (main === "other") {
                if (fullText.includes("大学入試") || fullText.includes("参考書")) main = "study";
                else if (fullText.includes("小説") || fullText.includes("文庫")) main = "literature";
                else if (fullText.includes("技術") || fullText.includes("工学")) main = "specialized";
                else if (fullText.includes("ビジネス") || fullText.includes("投資")) main = "business";
            }

            // --- C. 小ジャンル判定（APIカテゴリ + キーワード） ---
            // APIカテゴリに含まれる英語キーワードからマッピング
            for (const [key, val] of Object.entries(API_SUBGENRE_MAP)) {
                if (apiCats.includes(key)) subs.add(val);
            }
            // 日本語キーワードでも補完（例: "ミステリー"）
            if (fullText.includes("ミステリー") || fullText.includes("推理")) subs.add("mystery");
            if (fullText.includes("ファンタジー")) subs.add("fantasy");
            if (fullText.includes("歴史") || fullText.includes("時代")) subs.add("history");

            // --- D. 中ジャンル（ターゲット）判定 ---
            // 学習参考書の場合は特に厳密に判定
            for (const [key, keywords] of Object.entries(TARGET_KEYWORDS)) {
                if (keywords.some(k => fullText.includes(k))) targets.add(key);
            }
            
            // 整合性調整: 文芸の場合はターゲットをあまり絞らない（一般が多いので）
            if (main === "literature" && targets.size === 0) {
                targets.add("general");
            }

            return {
                mainGenre: main,
                targetGenres: Array.from(targets),
                subGenres: Array.from(subs)
            };
        }

        const logDiv = document.getElementById("log");
        function log(msg, type = "normal") {
            const div = document.createElement("div");
            div.textContent = msg;
            if (type === "change") div.className = "change";
            if (type === "sub-add") div.className = "sub-add";
            if (type === "no-change") div.className = "no-change";
            logDiv.appendChild(div);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        document.getElementById("btn-check").addEventListener("click", async () => {
            log("全データの診断を開始します...");
            pendingUpdates = [];
            
            const snapshot = await getDocs(collection(db, "books"));
            
            snapshot.forEach(d => {
                const data = d.data();
                const newResult = analyzeBookStructure(data);

                // 変更があるかチェック
                const isMainDiff = data.mainGenre !== newResult.mainGenre;
                
                // 配列の中身比較（ソートして文字化比較）
                const currentTargets = (data.targetGenres || []).sort().join(",");
                const newTargets = newResult.targetGenres.sort().join(",");
                const isTargetDiff = currentTargets !== newTargets;

                const currentSubs = (data.subGenres || []).sort().join(",");
                const newSubs = newResult.subGenres.sort().join(",");
                const isSubDiff = currentSubs !== newSubs;

                if (isMainDiff || isTargetDiff || isSubDiff) {
                    pendingUpdates.push({ id: d.id, ...newResult });
                    
                    let msg = `[変更] ${data.title.substring(0, 20)}...`;
                    if (isMainDiff) msg += ` | 大: ${data.mainGenre} -> ${newResult.mainGenre}`;
                    if (isSubDiff) msg += ` | 小: +${newResult.subGenres.length}個`;
                    
                    log(msg, isMainDiff ? "change" : "sub-add");
                } else {
                    // log(`[維持] ${data.title}`, "no-change");
                }
            });

            if (pendingUpdates.length > 0) {
                log(`\n合計 ${pendingUpdates.length} 件のデータ最適化が可能です。`);
                document.getElementById("btn-update").style.display = "inline-block";
            } else {
                log("\nすべてのデータは既に最適な状態です。");
            }
        });

        document.getElementById("btn-update").addEventListener("click", async () => {
            if (!confirm(`${pendingUpdates.length} 件のデータを最適化しますか？`)) return;

            log("更新を開始します...");
            const batchSize = 500;
            for (let i = 0; i < pendingUpdates.length; i += batchSize) {
                const batch = writeBatch(db);
                const chunk = pendingUpdates.slice(i, i + batchSize);
                
                chunk.forEach(item => {
                    const ref = doc(db, "books", item.id);
                    batch.update(ref, {
                        mainGenre: item.mainGenre,
                        targetGenres: item.targetGenres,
                        subGenres: item.subGenres
                    });
                });

                await batch.commit();
                log(`${Math.min(i + batchSize, pendingUpdates.length)} / ${pendingUpdates.length} 件 完了`);
            }
            log("完了！すべてのデータがAPI基準で最適化されました。");
        });
    </script>
</body>
</html>
