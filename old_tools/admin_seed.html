<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スマート重み付けデータ投入ツール（純粋スコア対応版）</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        h1 { color: #8e44ad; border-bottom: 2px solid #9b59b6; padding-bottom: 10px; }
        .log-area { 
            background: #1e1e1e; color: #e0e0e0; border: 1px solid #333; padding: 15px; 
            height: 450px; overflow-y: scroll; font-family: monospace; 
            margin-bottom: 20px; border-radius: 5px; line-height: 1.4;
        }
        .highlight { color: #f1c40f; font-weight: bold; }
        .btn { 
            background: #8e44ad; color: white; border: none; padding: 15px 30px; 
            font-size: 16px; cursor: pointer; border-radius: 5px; font-weight: bold;
        }
        .btn:hover { background: #732d91; }
        .btn:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>🏆 スマート重み付けデータ投入 (v2)</h1>
    <p>raw_score（純粋評価）と score（ボーナス込み）を同時に生成します。</p>
    
    <div class="status" id="statusMessage">準備完了</div>
    <div class="log-area" id="consoleLog"></div>
    <button id="startBtn" class="btn">データ投入を開始する</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8NPDFZcumM96ypgJOLSm5BA0I2wTBaKg",
            authDomain: "book-ree.firebaseapp.com",
            projectId: "book-ree",
            storageBucket: "book-ree.firebasestorage.app",
            messagingSenderId: "721168073032",
            appId: "1:721168073032:web:9d46233bd8b0d11b73f37d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const TARGETS = [
            { genreTag: "literature", keyword: "小説", label: "文芸・小説" },
            { genreTag: "business", keyword: "ビジネス", label: "ビジネス" },
            { genreTag: "comic", keyword: "コミック", label: "コミック" },
            { genreTag: "specialized", keyword: "科学", label: "専門書(科学)" },
            { genreTag: "children", keyword: "絵本 児童書", label: "児童書" },
            { genreTag: "hobby", keyword: "趣味", label: "趣味" },
            { genreTag: "study", keyword: "参考書", label: "学習参考書" }
        ];

        const logArea = document.getElementById("consoleLog");
        const statusMsg = document.getElementById("statusMessage");

        function log(msg, isHighlight = false) {
            const div = document.createElement("div");
            div.innerHTML = isHighlight ? `<span class="highlight">${msg}</span>` : `> ${msg}`;
            logArea.appendChild(div);
            logArea.scrollTop = logArea.scrollHeight;
        }

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // ★★★ 文字列正規化 ★★★
        const normalize = (str) => {
            if (!str) return "";
            return str.normalize('NFKC').replace(/[()（）]/g, "").replace(/\s+/g, "").toLowerCase();
        };

        // ★★★ ボーナス計算ロジック（分離版） ★★★
        function calculateScores(title, author, description) {
            // 1. 純粋スコア（初期シード用のランダム値）
            const baseScore = Math.floor(Math.random() * 3) + 3; // 3〜5点
            
            let bonus = 0;
            const textToCheck = (title + " " + author + " " + (description || "")).toLowerCase();

            // Sランク (+50)
            const sRank = ["本屋大賞", "直木賞", "芥川賞", "マンガ大賞", "手塚治虫文化賞", "ノーベル"];
            if (sRank.some(k => textToCheck.includes(k.toLowerCase()))) bonus = 50;
            else {
                // Aランク (+20)
                const aRank = ["村上春樹", "東野圭吾", "伊坂幸太郎", "池井戸潤", "尾田栄一郎", "J.K.ローリング", "ベストセラー"];
                if (aRank.some(k => textToCheck.includes(k.toLowerCase()))) bonus = 20;
                else {
                    // Bランク (+10)
                    const bRank = ["受賞", "第1位", "映画化", "ドラマ化", "アニメ化", "話題"];
                    if (bRank.some(k => textToCheck.includes(k.toLowerCase()))) bonus = 10;
                }
            }

            return {
                raw: baseScore,
                total: baseScore + bonus,
                bonus: bonus
            };
        }

        function determineGenres(info) {
             // 簡易的なジャンル判定（main.jsと同じロジック推奨だが、ここでは簡略化してAPIのジャンルも利用）
             // 実際にはmain.jsのdetermineGenresをコピーして使うのがベストですが、
             // シードデータではターゲットキーワードで検索しているため、target.genreTagをメインに使用します。
             return []; // 関数としては用意しておくが、今回はfetchAndSave内で処理
        }

        document.getElementById("startBtn").addEventListener("click", async function() {
            this.disabled = true;
            statusMsg.textContent = "処理中...";
            
            for (const target of TARGETS) {
                log(`\n=== 【${target.label}】 ===`);
                await fetchAndSave(target);
                await sleep(1000);
            }

            log("\n🎉 完了しました！");
            this.disabled = false;
        });

        async function fetchAndSave(target) {
            let addedCount = 0;
            let startIndex = 0;
            const MAX_FETCH = 20; 

            while (addedCount < MAX_FETCH) {
                const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(target.keyword)}&langRestrict=ja&printType=books&orderBy=relevance&maxResults=40&startIndex=${startIndex}`;
                
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    if (!data.items) break;

                    for (const item of data.items) {
                        const info = item.volumeInfo;
                        // 言語フィルタ
                        if (info.language !== "ja") continue;

                        // スコア計算
                        const scores = calculateScores(info.title, (info.authors||[]).join(","), info.description);
                        
                        // 検索用キー生成
                        const searchKey = normalize(info.title || "");

                        // 画像URL
                        const imgUrl = info.imageLinks ? (info.imageLinks.thumbnail || info.imageLinks.smallThumbnail) : null;

                        await setDoc(doc(db, "books", item.id), {
                            id: item.id,
                            title: info.title || "不明",
                            searchKey: searchKey, // 重複排除用に必須
                            author: info.authors ? info.authors.join(", ") : "著者不明",
                            authors: info.authors || [], // 配列形式も保存
                            genres: [target.genreTag],   // 配列形式で保存（main.jsのフィルタ対応）
                            description: info.description || "",
                            thumbnail: imgUrl,           // 古い互換用
                            image: imgUrl,               // 新しい命名規則用
                            
                            // ★ ここが変更点
                            score: scores.total,        // ボーナス込み
                            raw_score: scores.raw,      // 純粋な評価点
                            
                            categories: info.categories || [],
                            registeredAt: new Date(),
                            isAutoImport: true
                        }, { merge: true });

                        if (scores.bonus > 0) {
                            log(`★ [${scores.total}点(Raw:${scores.raw})] ${info.title} (Bonus:+${scores.bonus})`, true);
                        } else {
                            // log(`  [${scores.total}点] ${info.title}`);
                        }
                        
                        addedCount++;
                    }
                    startIndex += 40;
                    if(startIndex > 80) break; // 無限ループ防止

                } catch (e) {
                    console.error(e);
                    break;
                }
            }
        }
    </script>
</body>
</html>
