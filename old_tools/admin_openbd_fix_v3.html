<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>OpenBD修復ツール V3 (複数タグ対応)</title>
    <style>
        body { font-family: "Menlo", "Consolas", monospace; padding: 20px; background: #f0f0f0; color: #333; }
        #log { background: #1e1e1e; color: #eee; border: 1px solid #555; padding: 15px; height: 500px; overflow-y: scroll; margin-top: 15px; font-size: 13px; border-radius: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .success { color: #2ecc71; }      /* 緑 */
        .change { color: #f1c40f; font-weight: bold; } /* 黄色 */
        .error { color: #e74c3c; }        /* 赤 */
        .info { color: #3498db; }         /* 青 */
        .skip { color: #7f8c8d; }         /* グレー */
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; background: #8e44ad; color: white; border: none; border-radius: 4px; transition: background 0.2s; }
        button:hover { background: #9b59b6; }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
        h1 { margin-top: 0; color: #2c3e50; }
        #progress { font-weight: bold; margin-top: 10px; font-size: 1.1em; }
    </style>
</head>
<body>

    <h1>📚 OpenBD 修復ツール V3 (複数タグ対応版)</h1>
    <p>
        Google Books APIからISBNを取得・保存し、OpenBDで判定します。<br>
        <strong>【改良点】「専門(5)」は「一般+大学生」になど、複数のタグを自動付与します。</strong><br>
        ※処理には時間がかかります。タブを閉じないでください。
    </p>
    
    <button id="startBtn">🚀 修復を開始する (V3)</button>
    <div id="progress">待機中...</div>
    <div id="log">ログがここに表示されます...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD8NPDFZcumM96ypgJOLSm5BA0I2wTBaKg",
        authDomain: "book-ree.firebaseapp.com",
        projectId: "book-ree",
        storageBucket: "book-ree.firebasestorage.app",
        messagingSenderId: "721168073032",
        appId: "1:721168073032:web:9d46233bd8b0d11b73f37d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const logDiv = document.getElementById('log');
    const startBtn = document.getElementById('startBtn');
    const progressDiv = document.getElementById('progress');
    const API_KEY = firebaseConfig.apiKey; 

    function log(msg, type = '') {
        const div = document.createElement('div');
        div.textContent = msg;
        if (type) div.className = type;
        logDiv.appendChild(div);
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // ▼▼▼ 改良された判定ロジック ▼▼▼
    function getTargetFromCCode(cCode) {
        if (!cCode || cCode.length < 2) return null;
        const targetDigit = cCode.charAt(1);
        
        switch(targetDigit) {
            case '1': return ['general', 'university']; // 教養 → 一般＋大学生
            case '2': return ['elementary'];
            case '3': return ['junior_high'];
            case '4': return ['high_school'];
            case '5': return ['university', 'general']; // 専門・大学 → 大学生＋一般
            case '6': return ['general'];               // 成人（一般）
            case '0': return ['general'];               // 一般
            default: return ['general'];
        }
    }
    // ▲▲▲ 改良された判定ロジック ▲▲▲

    function getGenreFromCCode(cCode) {
        const first = cCode.charAt(0);
        if (first === '6' || first === '7') return 'study';
        if (first === '8') return 'children';
        return null;
    }

    startBtn.addEventListener('click', async () => {
        startBtn.disabled = true;
        log("🚀 データベースを読み込んでいます...", 'info');

        try {
            const snapshot = await getDocs(collection(db, "books"));
            const total = snapshot.size;
            let current = 0;
            let updatedCount = 0;

            log(`📦 合計 ${total} 冊のデータを検出。API制限を考慮して低速実行します...`, 'info');

            for (const docSnap of snapshot.docs) {
                current++;
                const data = docSnap.data();
                const googleId = docSnap.id;
                progressDiv.textContent = `進捗: ${current} / ${total} (修正完了: ${updatedCount}件)`;

                let updates = {};
                let isbn = null;

                // 1. ローカルデータからISBNを探す
                if (data.industryIdentifiers) {
                    const find = data.industryIdentifiers.find(i => i.type === 'ISBN_13') || data.industryIdentifiers.find(i => i.type === 'ISBN_10');
                    if (find) isbn = find.identifier;
                }

                // 2. なければGoogle Books APIから取得 (APIキー付き)
                if (!isbn) {
                    try {
                        const gRes = await fetch(`https://www.googleapis.com/books/v1/volumes/${googleId}?key=${API_KEY}`);
                        if (gRes.ok) {
                            const gData = await gRes.json();
                            const ids = gData.volumeInfo?.industryIdentifiers;
                            if (ids) {
                                updates.industryIdentifiers = ids; 
                                const find = ids.find(i => i.type === 'ISBN_13') || ids.find(i => i.type === 'ISBN_10');
                                if (find) isbn = find.identifier;
                            }
                        } else {
                            if(gRes.status === 429) {
                                log(`[${current}] ⚠️ API制限検知 (429)。少し待機します...`, 'error');
                                await new Promise(r => setTimeout(r, 2000));
                            }
                        }
                    } catch (e) {}
                }

                if (!isbn) {
                    log(`[${current}] 💨 ISBN取得不可 (ID: ${googleId}): ${data.title}`, 'skip');
                    await new Promise(r => setTimeout(r, 200)); 
                    continue;
                }

                // 3. OpenBDに問い合わせ
                try {
                    const cleanIsbn = isbn.replace(/[^0-9X]/g, '');
                    const bdRes = await fetch(`https://api.openbd.jp/v1/get?isbn=${cleanIsbn}`);
                    const bdData = await bdRes.json();
                    
                    if (bdData && bdData[0] && bdData[0].summary && bdData[0].summary.c_code) {
                        const cCode = bdData[0].summary.c_code;
                        const newTarget = getTargetFromCCode(cCode);
                        const correctGenre = getGenreFromCCode(cCode);

                        let reason = [];
                        const oldTargetStr = JSON.stringify(data.target || []);
                        const newTargetStr = JSON.stringify(newTarget);
                        
                        // ターゲットの修正
                        if (oldTargetStr !== newTargetStr) {
                            updates.target = newTarget;
                            updates.targetGenres = newTarget; 
                            reason.push(`対象: ${newTarget.join("+")}`);
                        }

                        // ジャンルの修正
                        if (correctGenre && data.mainGenre !== correctGenre) {
                            updates.mainGenre = correctGenre;
                            reason.push(`ジャンル: ${correctGenre}`);
                        }

                        if (data.cCode !== cCode) {
                            updates.cCode = cCode;
                        }

                        if (Object.keys(updates).length > 0) {
                            await updateDoc(doc(db, "books", googleId), updates);
                            log(`[${current}] ✏️ 更新 [${data.title}]: ${reason.join(", ")}`, 'change');
                            updatedCount++;
                        } else {
                            // ISBN情報の保存チェック
                            if (!data.industryIdentifiers && updates.industryIdentifiers) {
                                await updateDoc(doc(db, "books", googleId), { industryIdentifiers: updates.industryIdentifiers });
                                log(`[${current}] 💾 ISBNのみ保存: ${data.title}`, 'success');
                            } else {
                                log(`[${current}] ✅ 正常: ${data.title}`, 'success');
                            }
                        }
                    } else {
                        // OpenBDなし
                        if (!data.industryIdentifiers && updates.industryIdentifiers) {
                            await updateDoc(doc(db, "books", googleId), { industryIdentifiers: updates.industryIdentifiers });
                            log(`[${current}] 💾 OpenBDなし/ISBN保存: ${data.title}`, 'skip');
                        } else {
                            log(`[${current}] 💨 OpenBDなし: ${data.title}`, 'skip');
                        }
                    }
                } catch (err) {
                    log(`[${current}] ❌ エラー: ${data.title} ${err.message}`, 'error');
                }

                await new Promise(r => setTimeout(r, 300)); 
            }

            log(`🎉 全処理完了！ 合計 ${updatedCount} 件を修正しました。`, 'change');
            alert("修復完了しました！");

        } catch (e) {
            console.error(e);
            log("致命的なエラー: " + e.message, 'error');
        } finally {
            startBtn.disabled = false;
        }
    });
</script>

</body>
</html>
