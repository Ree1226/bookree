<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>OpenBD修復ツール V6 (ハイブリッド完全版)</title>
    <style>
        body { font-family: "Menlo", "Consolas", monospace; padding: 20px; background: #f0f0f0; color: #333; }
        #log { background: #1e1e1e; color: #eee; border: 1px solid #555; padding: 15px; height: 500px; overflow-y: scroll; margin-top: 15px; font-size: 13px; border-radius: 5px; }
        .success { color: #2ecc71; }
        .change { color: #f1c40f; font-weight: bold; }
        .error { color: #e74c3c; }
        .fallback { color: #3498db; }
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; background: #8e44ad; color: white; border: none; border-radius: 4px; transition: background 0.2s; }
        button:hover { background: #9b59b6; }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>🛡️ OpenBD 修復ツール V6 (ハイブリッド完全版)</h1>
    <p>
        1. OpenBDの基本データを確認<br>
        2. なければONIX(詳細データ)を確認<br>
        3. それでもなければタイトルからキーワード判定<br>
        この3段構えで、「ターゲット1900」等のデータ不備も救済します。
    </p>
    
    <button id="startBtn">🚀 完全修復を開始する (V6)</button>
    <div id="progress" style="margin-top:10px; font-weight:bold;">待機中...</div>
    <div id="log">ログがここに表示されます...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD8NPDFZcumM96ypgJOLSm5BA0I2wTBaKg",
        authDomain: "book-ree.firebaseapp.com",
        projectId: "book-ree",
        storageBucket: "book-ree.firebasestorage.app",
        messagingSenderId: "721168073032",
        appId: "1:721168073032:web:9d46233bd8b0d11b73f37d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const logDiv = document.getElementById('log');
    const startBtn = document.getElementById('startBtn');
    const progressDiv = document.getElementById('progress');

    function log(msg, type = '') {
        const div = document.createElement('div');
        div.textContent = msg;
        if (type) div.className = type;
        logDiv.appendChild(div);
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    // ▼ 1. Cコード判定ロジック
    function getTargetFromCCode(cCode) {
        if (!cCode || cCode.length < 2) return null;
        const targetDigit = cCode.charAt(1);
        switch(targetDigit) {
            case '1': return ['general', 'university']; 
            case '2': return ['elementary'];
            case '3': return ['junior_high'];
            case '4': return ['high_school'];
            case '5': return ['university', 'general']; 
            case '6': return ['general']; 
            case '0': return ['general']; 
            default: return ['general'];
        }
    }
    
    function getGenreFromCCode(cCode) {
        const first = cCode.charAt(0);
        if (first === '6' || first === '7') return 'study';
        if (first === '8') return 'children';
        return null;
    }

    // ▼ 2. キーワード判定ロジック (救済用)
    function guessTargetByKeyword(title) {
        const text = title.toLowerCase();
        
        // 【優先】受験・大学入試は高校生扱い
        if (text.includes("大学入試") || text.includes("大学受験") || text.includes("共通テスト") || text.includes("センター試験") || text.includes("ターゲット")) {
            return { target: ['high_school'], genre: 'study' };
        }
        if (text.includes("高校") || text.includes("古文") || text.includes("漢文")) {
            return { target: ['high_school'], genre: 'study' };
        }

        // 大学・専門
        if (text.includes("大学") || text.includes("論文") || text.includes("研究") || text.includes("学会")) {
            return { target: ['university', 'general'], genre: 'general' }; // 専門書はgenre:generalの場合が多いが、studyでも可
        }

        // 中学
        if (text.includes("中学")) {
            return { target: ['junior_high'], genre: 'study' };
        }

        // 小学・児童
        if (text.includes("小学") || text.includes("絵本") || text.includes("図鑑") || text.includes("童話")) {
            return { target: ['elementary'], genre: 'children' };
        }

        // 年鑑・白書など
        if (text.includes("年鑑") || text.includes("白書") || text.includes("報告")) {
            return { target: ['general'], genre: 'general' };
        }

        return null;
    }

    startBtn.addEventListener('click', async () => {
        startBtn.disabled = true;
        
        try {
            log("🚀 データベースを読み込んでいます...", 'info');
            const snapshot = await getDocs(collection(db, "books"));
            const docs = snapshot.docs;
            const total = docs.length;
            let updatedCount = 0;

            log(`📦 合計 ${total} 冊。修復を開始します。`, 'info');

            for (let i = 0; i < total; i++) {
                const docSnap = docs[i];
                const data = docSnap.data();
                const googleId = docSnap.id;
                progressDiv.textContent = `進捗: ${i + 1} / ${total} (修正完了: ${updatedCount}件)`;

                // 既にV4等で正常にISBNが入っている前提で進めます
                let isbn = null;
                if (data.industryIdentifiers) {
                    const find = data.industryIdentifiers.find(x => x.type === 'ISBN_13') || data.industryIdentifiers.find(x => x.type === 'ISBN_10');
                    if (find) isbn = find.identifier;
                }

                if (!isbn) {
                    // ISBNがないものはどうしようもないのでスキップ（今回はOpenBDチェックが主眼）
                    continue;
                }

                try {
                    // OpenBD問い合わせ
                    const cleanIsbn = isbn.replace(/[^0-9X]/g, '');
                    const bdRes = await fetch(`https://api.openbd.jp/v1/get?isbn=${cleanIsbn}`);
                    const bdData = await bdRes.json();
                    
                    let newTarget = null;
                    let newGenre = null;
                    let method = "";
                    let cCode = null;

                    // A. OpenBDデータがあるか
                    if (bdData && bdData[0]) {
                        const summary = bdData[0].summary;
                        const onix = bdData[0].onix;

                        // A-1. SummaryにCコードがあるか
                        if (summary && summary.c_code) {
                            cCode = summary.c_code;
                            method = "OpenBD(Summary)";
                        }
                        // A-2. なければONIXから探す
                        else if (onix && onix.DescriptiveDetail && onix.DescriptiveDetail.ProductClassification) {
                            const pc = onix.DescriptiveDetail.ProductClassification;
                            // Type 04 = C-Code
                            const found = pc.find(x => x.ProductClassificationType === '04');
                            if (found && found.ProductClassificationCode) {
                                cCode = found.ProductClassificationCode;
                                method = "OpenBD(Deep-ONIX)";
                            }
                        }

                        // Cコードが見つかったら判定
                        if (cCode) {
                            newTarget = getTargetFromCCode(cCode);
                            newGenre = getGenreFromCCode(cCode);
                        }
                    }

                    // B. Cコード判定ができなかった場合、キーワード救済
                    if (!newTarget) {
                        const guess = guessTargetByKeyword(data.title || "");
                        if (guess) {
                            newTarget = guess.target;
                            newGenre = guess.genre;
                            method = "Keyword-Rescue";
                        }
                    }

                    // C. 更新処理
                    if (newTarget) {
                        let updates = {};
                        const oldTargetStr = JSON.stringify(data.target || []);
                        const newTargetStr = JSON.stringify(newTarget);

                        if (oldTargetStr !== newTargetStr) {
                            updates.target = newTarget;
                            updates.targetGenres = newTarget; // 念のため
                            // Cコードが取れた場合のみ保存
                            if (cCode && data.cCode !== cCode) {
                                updates.cCode = cCode;
                            }
                            
                            // ジャンルも上書き（既存がgeneralで、新しいのがstudy等の場合など）
                            if (newGenre && data.mainGenre !== newGenre) {
                                updates.mainGenre = newGenre;
                            }

                            if (Object.keys(updates).length > 0) {
                                await updateDoc(doc(db, "books", googleId), updates);
                                log(`[${i+1}] ✏️ ${method}により修正: ${data.title} => ${newTarget.join(",")}`, method === 'Keyword-Rescue' ? 'fallback' : 'change');
                                updatedCount++;
                            }
                        }
                    }

                    // API制限回避のため少し待機
                    await sleep(200);

                } catch (err) {
                    console.error(err);
                }
            }

            log(`🎉 全処理完了！ 合計 ${updatedCount} 件を修復しました。`, 'success');

        } catch (e) {
            log("エラー: " + e.message, 'error');
        } finally {
            startBtn.disabled = false;
        }
    });
</script>

</body>
</html>
