<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>【修正完了版】OpenBD連動ジャンル完全修復ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .log-area { 
            height: 400px; overflow-y: scroll; background: #222; color: #0f0; 
            padding: 10px; font-family: monospace; margin: 20px 0; border-radius: 4px; 
        }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:disabled { background: #ccc; }
        .stats { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 OpenBD連動 ジャンル修復（学習・実用対応版）</h1>
        <p>
            1. OpenBD (Cコード) による厳密判定<br>
            2. キーワードによるバックアップ判定（参考書・実用書対応）<br>
            の両方を行い、ジャンルを正しい状態に復旧します。
        </p>
        
        <div class="stats" id="statsDisplay">待機中...</div>
        <button id="startBtn">修復プロセス開始</button>
        <div class="log-area" id="logArea"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // ★ここに既存のfirebaseConfigを貼り付けてください
        const firebaseConfig = {
            apiKey: "AIzaSyD8NPDFZcumM96ypgJOLSm5BA0I2wTBaKg",
            authDomain: "book-ree.firebaseapp.com",
            projectId: "book-ree",
            storageBucket: "book-ree.firebasestorage.app",
            messagingSenderId: "721168073032",
            appId: "1:721168073032:web:9d46233bd8b0d11b73f37d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const logArea = document.getElementById('logArea');
        const statsDisplay = document.getElementById('statsDisplay');

        function log(msg, type="info") {
            const p = document.createElement('div');
            p.textContent = `> ${msg}`;
            if(type === "warn") p.style.color = "#ffcc00"; // 黄色：変更あり
            if(type === "error") p.style.color = "#ff5555"; // 赤：エラー
            if(type === "success") p.style.color = "#00ffff"; // 水色：完了
            logArea.appendChild(p);
            logArea.scrollTop = logArea.scrollHeight;
        }

        // --- 1. OpenBD API ---
        async function fetchOpenBDData(isbns) {
            if (isbns.length === 0) return [];
            const url = `https://api.openbd.jp/v1/get?isbn=${isbns.join(',')}`;
            try {
                const res = await fetch(url);
                return await res.json();
            } catch (e) {
                console.error("OpenBD Error:", e);
                return Array(isbns.length).fill(null);
            }
        }

        // --- 2. Cコード解析ロジック（学習・実用を追加） ---
        function getGenreFromCCode(cCode) {
            if (!cCode || cCode.length < 1) return null;
            const firstChar = cCode.charAt(0);
            const thirdChar = cCode.length >= 3 ? cCode.charAt(2) : '';

            // 優先度高：明確な区分
            if (firstChar === '8') return 'children'; // 児童書
            if (firstChar === '6') return 'study';    // 学習参考書
            if (firstChar === '7') return 'study';    // 中高参・辞書（一旦studyへ）
            if (firstChar === '2') return 'hobby';    // 実用・趣味

            // 専門・一般の振り分け
            if (firstChar === '1' || firstChar === '0') {
                if (thirdChar === '9' || thirdChar === '1') return 'literature'; // 文学・教養
                if (thirdChar === '3') return 'business';   // 社会科学
                if (thirdChar === '4') return 'specialized'; // 自然科学
                return 'literature'; // デフォルト
            }

            if (firstChar === '3') { // 社会科学・自然科学
                if (thirdChar === '9') return 'literature';
                if (thirdChar === '3') return 'business';
                return 'specialized';
            }
            if (firstChar === '4' || firstChar === '5') return 'specialized'; // 理工・医学

            return 'other';
        }

        // --- 3. キーワード解析ロジック（ここを大幅強化しました） ---
        function analyzeBookStructureFallback(info) {
            const apiCats = (info.categories || []).join(" ").toLowerCase();
            const fullText = JSON.stringify([info.title, info.categories, info.description]).toLowerCase();

            // 判定結果の初期値
            let main = "other";
            let targets = new Set();

            // キーワード定義
            const KW_STUDY = ["参考書", "問題集", "ドリル", "辞典", "検定", "教科書", "study", "education"];
            const KW_HOBBY = ["レシピ", "料理", "ガイド", "地図", "旅行", "写真集", "占い", "手芸", "cooking", "travel", "hobbies"];
            const KW_BIZ = ["ビジネス", "経済", "経営", "business", "economics"];
            const KW_TECH = ["コンピュータ", "工学", "科学", "technology", "science"];
            const KW_CHILD = ["絵本", "童話", "図鑑", "children", "juvenile"];

            // 優先順位付き判定
            if (KW_STUDY.some(k => fullText.includes(k))) {
                main = "study";
            } else if (KW_HOBBY.some(k => fullText.includes(k)) || apiCats.includes("cooking")) {
                main = "hobby";
            } else if (KW_BIZ.some(k => fullText.includes(k))) {
                main = "business";
            } else if (KW_TECH.some(k => fullText.includes(k))) {
                main = "specialized";
            } else if (KW_CHILD.some(k => fullText.includes(k))) {
                main = "children";
                if(fullText.includes("絵本")) targets.add("toddler");
                else targets.add("elementary");
            } else if (apiCats.includes("fiction") || apiCats.includes("literature") || fullText.includes("小説")) {
                main = "literature";
            }

            return { mainGenre: main, targetGenres: Array.from(targets) };
        }

        // --- 4. メイン処理 ---
        document.getElementById('startBtn').addEventListener('click', async () => {
            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            log("--- データベース読み込み開始 ---");

            try {
                const querySnapshot = await getDocs(collection(db, "books"));
                const docs = querySnapshot.docs;
                log(`合計 ${docs.length} 冊のデータを処理します...`);

                let updatedCount = 0;
                const BATCH_SIZE = 50; 
                
                for (let i = 0; i < docs.length; i += BATCH_SIZE) {
                    const chunkDocs = docs.slice(i, i + BATCH_SIZE);
                    const isbns = [];
                    
                    // ISBN収集
                    chunkDocs.forEach(doc => {
                        const data = doc.data();
                        let isbn = null;
                        if (data.industryIdentifiers) {
                            const found = data.industryIdentifiers.find(id => id.type === "ISBN_13") || data.industryIdentifiers.find(id => id.type === "ISBN_10");
                            if(found) isbn = found.identifier;
                        }
                        if (isbn) isbns.push(isbn);
                    });

                    // OpenBD問い合わせ
                    let openBdResults = [];
                    if (isbns.length > 0) {
                        openBdResults = await fetchOpenBDData(isbns);
                    }

                    // 更新バッチ
                    const batch = writeBatch(db);
                    let batchOpCount = 0;

                    for (let j = 0; j < chunkDocs.length; j++) {
                        const docSnapshot = chunkDocs[j];
                        const data = docSnapshot.data();
                        
                        let cCode = null;
                        
                        // ISBN照合
                        let isbn = null;
                        if (data.industryIdentifiers) {
                             const found = data.industryIdentifiers.find(id => id.type === "ISBN_13") || data.industryIdentifiers.find(id => id.type === "ISBN_10");
                             if(found) isbn = found.identifier;
                        }

                        // OpenBDからCコードを探す
                        if (isbn) {
                            const idx = isbns.indexOf(isbn);
                            if (idx !== -1 && openBdResults[idx] && openBdResults[idx].summary) {
                                cCode = openBdResults[idx].summary.c_code;
                            }
                        }

                        // ★判定ロジック分岐
                        let newMainGenre = "other";
                        let newTargets = data.targetGenres || [];
                        let logicSource = "";

                        if (cCode) {
                            // Cコードがある場合（最強）
                            newMainGenre = getGenreFromCCode(cCode);
                            logicSource = `OpenBD(C${cCode})`;
                            
                            // 児童書ならターゲット補完
                            if (newMainGenre === "children") {
                                if(!newTargets.includes("elementary")) newTargets.push("elementary");
                            }
                        } else {
                            // Cコードがない場合（キーワード安全策）
                            // ここで「参考書」などを拾えるように強化しました
                            const fallback = analyzeBookStructureFallback(data);
                            newMainGenre = fallback.mainGenre;
                            if (fallback.targetGenres.length > 0) newTargets = fallback.targetGenres;
                            logicSource = "Keywords(Fallback)";
                        }

                        // 変更があれば更新
                        if (data.mainGenre !== newMainGenre) {
                            log(`[修正] ${data.title}: ${data.mainGenre} -> ${newMainGenre} [by ${logicSource}]`, "warn");
                            batch.update(doc(db, "books", docSnapshot.id), {
                                mainGenre: newMainGenre,
                                targetGenres: newTargets,
                                cCode: cCode || null
                            });
                            batchOpCount++;
                            updatedCount++;
                        }
                    }

                    if (batchOpCount > 0) await batch.commit();
                }

                log(`完了！ 合計 ${updatedCount} 冊のジャンルを適正化しました。`, "success");
                statsDisplay.textContent = `完了 (更新: ${updatedCount}冊)`;

            } catch (e) {
                console.error(e);
                log(`エラー: ${e.message}`, "error");
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
