<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Fictionカテゴリ内訳調査ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .danger { background-color: #ffe6e6; } /* 児童書っぽいもの */
    </style>
</head>
<body>
    <h1>"Fiction" カテゴリ実態調査</h1>
    <p>データベース内の「categories」に「Fiction」が含まれている、またはカテゴリが空の本をリストアップします。</p>
    <button id="checkBtn">調査開始</button>
    <div id="status"></div>
    <table id="resultTable">
        <thead>
            <tr>
                <th>タイトル</th>
                <th>著者</th>
                <th>Google APIのカテゴリ</th>
                <th>説明文（抜粋）</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <!-- Firebase SDK (既存の管理ツールと同じ構成にしています) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // ★ここに既存のfirebaseConfigを貼り付けてください
        const firebaseConfig = {
            apiKey: "AIzaSyD8NPDFZcumM96ypgJOLSm5BA0I2wTBaKg",
            authDomain: "book-ree.firebaseapp.com",
            projectId: "book-ree",
            storageBucket: "book-ree.firebasestorage.app",
            messagingSenderId: "721168073032",
            appId: "1:721168073032:web:9d46233bd8b0d11b73f37d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('checkBtn').addEventListener('click', async () => {
            const status = document.getElementById('status');
            const tbody = document.querySelector('#resultTable tbody');
            tbody.innerHTML = '';
            status.textContent = 'データを取得中...';

            try {
                const querySnapshot = await getDocs(collection(db, "books"));
                let count = 0;
                let fictionCount = 0;

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const cats = data.categories || [];
                    const catsStr = cats.join(", ").toLowerCase();
                    const title = data.title || "";
                    
                    // 調査対象: Fictionが含まれている、またはカテゴリが無い
                    if (catsStr.includes("fiction") || cats.length === 0) {
                        fictionCount++;
                        
                        const tr = document.createElement('tr');
                        
                        // 目視確認しやすくするため、児童書っぽいキーワードがあれば赤くする（あくまで参考）
                        if (title.includes("絵本") || title.includes("童話") || title.includes("小学") || title.includes("こども")) {
                            tr.className = "danger";
                        }

                        tr.innerHTML = `
                            <td>${data.title}</td>
                            <td>${(data.authors || []).join(", ")}</td>
                            <td>${cats.join(", ")}</td> <!-- 生のデータ -->
                            <td style="font-size:0.8em; color:#666;">${(data.description || "").substring(0, 50)}...</td>
                        `;
                        tbody.appendChild(tr);
                    }
                    count++;
                });

                status.textContent = `完了: 全${count}冊中、${fictionCount}冊が「Fiction」または「カテゴリなし」でした。`;

            } catch (e) {
                console.error(e);
                status.textContent = 'エラーが発生しました: ' + e.message;
            }
        });
    </script>
</body>
</html>
