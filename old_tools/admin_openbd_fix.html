<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>OpenBD連携 完全修復ツール</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f0f0f0; }
        #log { background: #fff; border: 1px solid #ccc; padding: 10px; height: 500px; overflow-y: scroll; margin-top: 10px; white-space: pre-wrap; }
        .success { color: green; }
        .change { color: blue; font-weight: bold; }
        .error { color: red; }
        .skip { color: #888; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #2980b9; color: white; border: none; border-radius: 4px; }
        button:disabled { background: #ccc; }
        h1 { margin-top: 0; }
    </style>
</head>
<body>

    <h1>📚 OpenBD Cコード一括判定・修復ツール</h1>
    <p>既存のデータに対してOpenBD照会を行い、「ターゲット1900」などを正しい年代（high_school等）に修正します。<br>
    処理には時間がかかります（1冊あたり約0.5秒〜1秒）。タブを閉じないでください。</p>
    
    <button id="startBtn">修復を開始する</button>
    <div id="progress">待機中...</div>
    <div id="log"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD8NPDFZcumM96ypgJOLSm5BA0I2wTBaKg",
        authDomain: "book-ree.firebaseapp.com",
        projectId: "book-ree",
        storageBucket: "book-ree.firebasestorage.app",
        messagingSenderId: "721168073032",
        appId: "1:721168073032:web:9d46233bd8b0d11b73f37d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const logDiv = document.getElementById('log');
    const startBtn = document.getElementById('startBtn');
    const progressDiv = document.getElementById('progress');

    function log(msg, type = '') {
        const div = document.createElement('div');
        div.textContent = msg;
        if (type) div.className = type;
        logDiv.appendChild(div);
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // Cコード解析ロジック（Main.jsと同じ基準）
    function getTargetFromCCode(cCode) {
        if (!cCode || cCode.length < 2) return null;
        const targetDigit = cCode.charAt(1); // 2桁目が読者対象
        switch(targetDigit) {
            case '1': return ['infant'];      // 幼児
            case '2': return ['elementary'];  // 小学生
            case '3': return ['junior_high']; // 中学生
            case '4': return ['high_school']; // 高校生
            case '5': return ['university'];  // 専門・大学
            case '0': return ['general'];     // 一般
            default: return ['general'];
        }
    }

    // ジャンル補正（Cコードがあるならジャンルも正しいものに直す）
    function getGenreFromCCode(cCode) {
        const first = cCode.charAt(0);
        if (first === '6' || first === '7') return 'study'; // 学参
        if (first === '8') return 'children'; // 児童書
        return null; // それ以外は既存を維持
    }

    startBtn.addEventListener('click', async () => {
        startBtn.disabled = true;
        log("🚀 データベースを読み込んでいます...", 'change');

        try {
            const snapshot = await getDocs(collection(db, "books"));
            const total = snapshot.size;
            let current = 0;
            let updatedCount = 0;

            log(`📦 合計 ${total} 冊のデータを検出しました。解析を開始します...`);

            // 直列処理でAPI制限を回避しながら実行
            for (const docSnap of snapshot.docs) {
                current++;
                const data = docSnap.data();
                const googleId = docSnap.id;
                progressDiv.textContent = `進捗: ${current} / ${total}`;

                // すでにCコードを持っていて、targetも正しそうならスキップ（高速化）
                // ただし今回は「強制修正」したいので、チェックは甘くせず全件確認します。
                
                // 1. ISBNを探す
                let isbn = null;
                if (data.industryIdentifiers) { // 保存されている場合
                    const find = data.industryIdentifiers.find(i => i.type === 'ISBN_13') || data.industryIdentifiers.find(i => i.type === 'ISBN_10');
                    if (find) isbn = find.identifier;
                }

                // ISBNがない場合、Google Books APIから再取得を試みる
                if (!isbn) {
                    try {
                        const gRes = await fetch(`https://www.googleapis.com/books/v1/volumes/${googleId}`);
                        if (gRes.ok) {
                            const gData = await gRes.json();
                            const ids = gData.volumeInfo?.industryIdentifiers;
                            if (ids) {
                                const find = ids.find(i => i.type === 'ISBN_13') || ids.find(i => i.type === 'ISBN_10');
                                if (find) isbn = find.identifier;
                            }
                        }
                    } catch (e) {
                        // Google APIエラーは無視して次へ
                    }
                }

                if (!isbn) {
                    log(`[${current}/${total}] ⚠️ ISBN不明のためスキップ: ${data.title}`, 'skip');
                    continue;
                }

                // 2. OpenBDに問い合わせ
                try {
                    const bdRes = await fetch(`https://api.openbd.jp/v1/get?isbn=${isbn}`);
                    const bdData = await bdRes.json();
                    
                    if (bdData && bdData[0] && bdData[0].summary && bdData[0].summary.c_code) {
                        const cCode = bdData[0].summary.c_code;
                        const newTarget = getTargetFromCCode(cCode);
                        const correctGenre = getGenreFromCCode(cCode);

                        // 更新が必要か判定
                        let updates = {};
                        let reason = [];

                        // ターゲットの更新（配列比較）
                        const oldTargetStr = JSON.stringify(data.target || []);
                        const newTargetStr = JSON.stringify(newTarget);
                        
                        if (oldTargetStr !== newTargetStr) {
                            updates.target = newTarget; // 新しいフィールド target を更新
                            updates.targetGenres = newTarget; // 旧フィールドも念のため更新
                            reason.push(`対象修正: ${oldTargetStr} -> ${newTargetStr}`);
                        }

                        // ジャンルの修正（学参なのにgeneralになってる等を救済）
                        if (correctGenre && data.mainGenre !== correctGenre) {
                            updates.mainGenre = correctGenre;
                            reason.push(`ジャンル修正: ${data.mainGenre} -> ${correctGenre}`);
                        }

                        // Cコード自体も保存
                        if (data.cCode !== cCode) {
                            updates.cCode = cCode;
                        }

                        if (Object.keys(updates).length > 0) {
                            await updateDoc(doc(db, "books", googleId), updates);
                            log(`[${current}/${total}] ✏️ 更新 [${data.title}]: ${reason.join(", ")}`, 'change');
                            updatedCount++;
                        } else {
                            log(`[${current}/${total}] ✅ 正常 (変更なし): ${data.title}`, 'success');
                        }

                    } else {
                        log(`[${current}/${total}] 💨 OpenBDデータなし: ${data.title}`, 'skip');
                    }

                } catch (err) {
                    log(`[${current}/${total}] ❌ エラー: ${data.title} ${err.message}`, 'error');
                }

                // API負荷軽減のためのウェイト
                await new Promise(r => setTimeout(r, 100)); 
            }

            log(`🎉 完了しました！ 合計 ${updatedCount} 件のデータを修復しました。`, 'change');
            alert("修復完了！データベースを確認してください。");

        } catch (e) {
            console.error(e);
            log("致命的なエラーが発生しました: " + e.message, 'error');
        } finally {
            startBtn.disabled = false;
        }
    });
</script>

</body>
</html>
