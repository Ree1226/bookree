<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>学習参考書 スマート修復ツール（マルチタグ対応版）</title>
    <style>
        body { font-family: "Noto Sans JP", sans-serif; padding: 20px; background: #f4f6f9; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { border-bottom: 3px solid #27ae60; padding-bottom: 10px; color: #2c3e50; }
        .desc { background: #e9f7ef; padding: 15px; border-radius: 5px; margin-bottom: 20px; border-left: 5px solid #27ae60; }
        button { background: #27ae60; color: white; border: none; padding: 15px 30px; font-size: 16px; font-weight:bold; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #219150; }
        #log { margin-top: 20px; padding: 15px; background: #2c3e50; color: #ecf0f1; height: 500px; overflow-y: scroll; font-family: monospace; border-radius: 4px; white-space: pre-wrap; font-size: 13px; }
        .success { color: #2ecc71; }
        .update { color: #f1c40f; font-weight: bold; }
        .info { color: #bdc3c7; }
        .tag { display: inline-block; padding: 2px 6px; border-radius: 4px; background: #34495e; margin: 0 2px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧠 学習参考書 スマート修復 (V2)</h1>
    <div class="desc">
        <p><strong>対象書籍:</strong> mainGenre = "study" のみ</p>
        <p>Google Books APIの情報に基づき、以下の「マルチタグ」ロジックでデータを再構築します。</p>
        <ul>
            <li><strong>詳細タグ (categories):</strong> 英語→日本語変換</li>
            <li><strong>対象・年代 (target):</strong> タイトルから複数を自動判定（例: 高校生 + 大学生）</li>
        </ul>
    </div>
    <button id="btnRun">マルチタグ修復を実行する</button>
    <div id="log">待機中...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, collection, getDocs, query, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

// ▼▼▼ APIキー設定（ご自身のものに書き換えてください） ▼▼▼
const firebaseConfig = {
            apiKey: "AIzaSyD8NPDFZcumM96ypgJOLSm5BA0I2wTBaKg",
            authDomain: "book-ree.firebaseapp.com",
            projectId: "book-ree",
            storageBucket: "book-ree.firebasestorage.app",
            messagingSenderId: "721168073032",
            appId: "1:721168073032:web:9d46233bd8b0d11b73f37d"
        };
// ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const logEl = document.getElementById("log");

function log(msg, type = "") {
    const div = document.createElement("div");
    div.innerHTML = msg; // HTMLタグ許可
    if (type) div.className = type;
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;
}

// ---------------------------------------------------------
// 1. カテゴリ変換辞書 (英語 -> 日本語)
// ---------------------------------------------------------
const categoryMap = {
    "Study Aids": "学習参考書", "Education": "教育", "Foreign Language Study": "語学",
    "Language Arts & Disciplines": "語学", "Mathematics": "数学", "Science": "科学",
    "Reference": "参考図書", "History": "歴史", "Computers": "コンピュータ",
    "Technology & Engineering": "工学", "Business & Economics": "ビジネス",
    "Psychology": "心理学", "Philosophy": "哲学", "Law": "法律", "Medical": "医学"
};

// ---------------------------------------------------------
// 2. ターゲット判定キーワード辞書
// ---------------------------------------------------------
// キーワードが含まれていたら、対応する target ID を付与します
const targetKeywords = [
    { id: "infant",      words: ["幼児", "えほん", "絵本", "0歳", "1歳", "2歳", "3歳", "4歳", "5歳", "こども", "ひらがな", "知育"] },
    { id: "elementary",  words: ["小学", "児童", "1年生", "2年生", "3年生", "4年生", "5年生", "6年生", "中学受験", "計算ドリル", "漢字ドリル"] },
    { id: "junior_high", words: ["中学", "高校受験", "中1", "中2", "中3", "13歳", "14歳", "15歳"] },
    { id: "high_school", words: ["高校", "大学受験", "共通テスト", "センター試験", "高1", "高2", "高3", "16歳", "17歳", "18歳", "チャート式"] },
    { id: "university",  words: ["大学", "学術", "論文", "キャンパス"] },
    // general はキーワード判定ではなく、上記に該当しない場合や、特定の大人向けワードで追加
    { id: "general",     words: ["ビジネス", "社会人", "資格", "TOEIC", "実務", "教養", "生涯学習"] }
];

async function fetchGoogleBooksInfo(bookId) {
    try {
        const res = await fetch(`https://www.googleapis.com/books/v1/volumes/${bookId}`);
        if (!res.ok) return null;
        return await res.json();
    } catch (e) { return null; }
}

// =========================================================
//  ★ マルチタグ自動判定ロジック ★
// =========================================================
function determineMetadata(googleData, currentTitle) {
    let newCategories = ["学習参考書"];
    let newTargets = []; // 配列で初期化

    if (googleData && googleData.volumeInfo) {
        const info = googleData.volumeInfo;
        const title = (info.title || currentTitle || "").toLowerCase();
        const subtitle = (info.subtitle || "").toLowerCase();
        const rawCats = info.categories || [];
        const fullText = title + " " + subtitle; // 検索対象テキスト

        // --- 1. カテゴリ翻訳 ---
        if (rawCats.length > 0) {
            const mapped = rawCats.map(engCat => {
                for (const [key, val] of Object.entries(categoryMap)) {
                    if (engCat.includes(key)) return val;
                }
                return null;
            }).filter(c => c !== null);
            if (mapped.length > 0) newCategories = [...new Set(mapped)];
        }

        // --- 2. ターゲット判定 (複数可) ---
        targetKeywords.forEach(group => {
            const hit = group.words.some(word => fullText.includes(word));
            if (hit) {
                newTargets.push(group.id);
            }
        });

        // --- 補正ロジック ---
        // 何もタグがつかなかった場合 -> "general" (一般) とする
        if (newTargets.length === 0) {
            newTargets.push("general");
        }
        
        // "大学受験" は高校生が読むものだが、難関大向けなら大学生や一般も読むかも？
        // 必要ならここで組み合わせの補正を行います。
        // 例: TOEICなら 大学生 + 一般
        if (fullText.includes("toeic") || fullText.includes("toefl")) {
            if (!newTargets.includes("university")) newTargets.push("university");
            if (!newTargets.includes("general")) newTargets.push("general");
        }
    } else {
        // データ取得失敗時は、安全策として一般のみ
        newTargets = ["general"];
    }
    
    // 重複排除
    newTargets = [...new Set(newTargets)];

    return { categories: newCategories, target: newTargets };
}

document.getElementById("btnRun").addEventListener("click", async () => {
    const btn = document.getElementById("btnRun");
    btn.disabled = true;
    log("=== マルチタグ修復処理を開始します ===", "info");

    try {
        // studyジャンルのみ取得
        const q = query(collection(db, "books"), where("mainGenre", "==", "study"));
        const snapshot = await getDocs(q);
        
        log(`対象書籍: ${snapshot.size} 冊`, "info");
        let updatedCount = 0;

        for (const docSnap of snapshot.docs) {
            const data = docSnap.data();
            const bookId = docSnap.id;
            
            const googleData = await fetchGoogleBooksInfo(bookId);
            const result = determineMetadata(googleData, data.title);
            
            // 変更検知 (配列の中身をソートして文字列比較)
            const currentTargetStr = JSON.stringify((data.target || []).sort());
            const newTargetStr = JSON.stringify(result.target.sort());
            const currentCatStr = JSON.stringify((data.categories || []).sort());
            const newCatStr = JSON.stringify(result.categories.sort());

            if (currentTargetStr !== newTargetStr || currentCatStr !== newCatStr) {
                await updateDoc(doc(db, "books", bookId), {
                    categories: result.categories,
                    target: result.target
                });

                const targetDisplay = result.target.map(t => `<span class="tag">${t}</span>`).join("");
                log(`[更新] ${data.title}<br>　└ Tags: ${targetDisplay}`, "update");
                updatedCount++;
            } else {
                log(`[OK] ${data.title}`, "success");
            }
            await new Promise(r => setTimeout(r, 200));
        }

        log(`\n=== 完了: ${updatedCount}冊 更新 ===`, "info");
    } catch (e) {
        log(`エラー: ${e.message}`, "error");
        console.error(e);
    }
    
    btn.disabled = false;
    btn.textContent = "完了";
});
</script>
</body>
</html>
