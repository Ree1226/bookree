<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>全ジャンル網羅・完全入荷ツール</title>
    <style>
        body { font-family: "Noto Sans JP", sans-serif; padding: 20px; background: #2c3e50; color: #ecf0f1; }
        .container { max-width: 1000px; margin: 0 auto; background: #34495e; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h1 { border-bottom: 3px solid #e74c3c; padding-bottom: 10px; color: #fff; }
        p { color: #bdc3c7; }

        .controls { margin: 20px 0; display: flex; gap: 10px; }
        button { border: none; padding: 15px 30px; font-size: 16px; font-weight:bold; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        #btnStart { background: #e74c3c; color: white; }
        #btnStart:hover { background: #c0392b; }
        #btnStart:disabled { background: #7f8c8d; cursor: not-allowed; }

        #progress-bar { width: 100%; background: #2c3e50; height: 20px; border-radius: 10px; overflow: hidden; margin-bottom: 10px; border: 1px solid #7f8c8d; }
        #progress-fill { width: 0%; height: 100%; background: #2ecc71; transition: width 0.3s; }

        #log { margin-top: 20px; padding: 15px; background: #000; color: #0f0; height: 500px; overflow-y: scroll; font-family: monospace; border-radius: 4px; font-size: 12px; border: 1px solid #7f8c8d; }
        .log-genre { color: #f1c40f; font-weight: bold; margin-top: 10px; }
        .log-error { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 全ジャンル網羅・データ完全入荷ツール</h1>
    <p>
        サイト内の全小ジャンル（約50種）に対し、それぞれ検索を行い、
        各ジャンル最低50冊以上の登録を目指して大量入荷を行います。<br>
        ※API制限を考慮し、ゆっくり実行されるため数分かかります。ブラウザを閉じないでください。
    </p>

    <div class="controls">
        <button id="btnStart">🚀 全ジャンル入荷開始</button>
    </div>

    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="status-text">待機中...</div>

    <div id="log">ログが表示されます...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, doc, setDoc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

// ▼▼▼ ここを main.js の内容に書き換えてください ▼▼▼
const firebaseConfig = {
            apiKey: "AIzaSyD8NPDFZcumM96ypgJOLSm5BA0I2wTBaKg",
            authDomain: "book-ree.firebaseapp.com",
            projectId: "book-ree",
            storageBucket: "book-ree.firebasestorage.app",
            messagingSenderId: "721168073032",
            appId: "1:721168073032:web:9d46233bd8b0d11b73f37d"
        };
// ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 全ジャンル検索リスト
// 各ジャンルで確実にヒットするキーワードを設定
const GENRE_TARGETS = [
    // --- 文芸 ---
    { id: "mystery", q: "ミステリー小説", main: "literature" },
    { id: "fantasy", q: "ファンタジー小説", main: "literature" },
    { id: "sf", q: "SF小説", main: "literature" },
    { id: "history", q: "歴史小説", main: "literature" },
    { id: "romance", q: "恋愛小説", main: "literature" },
    { id: "horror", q: "ホラー小説", main: "literature" },
    { id: "youth", q: "青春小説", main: "literature" },
    { id: "human", q: "感動する小説", main: "literature" },
    
    // --- ビジネス ---
    { id: "management", q: "経営学", main: "business" },
    { id: "marketing", q: "マーケティング", main: "business" },
    { id: "finance", q: "株式投資", main: "business" },
    { id: "work", q: "仕事術", main: "business" },
    { id: "career", q: "転職 キャリア", main: "business" },
    { id: "leadership", q: "リーダーシップ", main: "business" },
    { id: "economy", q: "日本経済", main: "business" },

    // --- 趣味・実用 ---
    { id: "cooking", q: "料理レシピ", main: "hobby" },
    { id: "health", q: "健康 ダイエット", main: "hobby" },
    { id: "parenting", q: "育児 子育て", main: "hobby" },
    { id: "travel", q: "国内旅行 ガイド", main: "hobby" },
    { id: "beauty", q: "美容 メイク", main: "hobby" },
    { id: "sports", q: "スポーツ上達", main: "hobby" },
    { id: "camera", q: "カメラ 撮影テクニック", main: "hobby" },
    
    // --- 専門書 ---
    { id: "science_tech", q: "科学技術", main: "specialized" },
    { id: "humanities", q: "哲学 思想", main: "specialized" },
    { id: "social_science", q: "社会学 入門", main: "specialized" },
    { id: "art", q: "芸術 アート", main: "specialized" },
    { id: "medical", q: "医学書", main: "specialized" },
    { id: "language", q: "英語学習", main: "specialized" },
    { id: "license", q: "資格試験 テキスト", main: "specialized" },

    // --- 児童書 ---
    { id: "picturebook", q: "絵本 人気", main: "children" },
    { id: "fairytale", q: "童話 昔話", main: "children" },
    { id: "zukan", q: "図鑑", main: "children" },
    { id: "biography", q: "伝記 児童書", main: "children" },
    { id: "study_manga", q: "学習まんが", main: "children" }
];

const logEl = document.getElementById("log");
const statusText = document.getElementById("status-text");
const progressFill = document.getElementById("progress-fill");

function log(msg, type="normal") {
    const div = document.createElement("div");
    div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    if(type === "genre") div.className = "log-genre";
    if(type === "error") div.className = "log-error";
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;
}

function updateProgress(current, total) {
    const per = Math.round((current / total) * 100);
    progressFill.style.width = `${per}%`;
    statusText.textContent = `進捗: ${current} / ${total} ジャンル完了 (${per}%)`;
}

// 1〜50のランダムスコア
function getRandomScore() {
    return Math.floor(Math.random() * 50) + 1;
}

// 処理実行
document.getElementById("btnStart").addEventListener("click", async () => {
    const btn = document.getElementById("btnStart");
    btn.disabled = true;
    log("=== 入荷プロセスを開始します ===");
    log(`ターゲット: 全 ${GENRE_TARGETS.length} ジャンル × 2ページ分検索`);

    let totalNewBooks = 0;
    
    for (let i = 0; i < GENRE_TARGETS.length; i++) {
        const target = GENRE_TARGETS[i];
        updateProgress(i, GENRE_TARGETS.length);
        
        log(`📂 ジャンル処理中: ${target.q} (${target.id})`, "genre");

        // 1ジャンルにつき2回リクエストして約80件の候補を取得し、50冊以上の確保を目指す
        const startIndices = [0, 40]; 
        
        for (const startIndex of startIndices) {
            try {
                const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(target.q)}&langRestrict=ja&maxResults=40&startIndex=${startIndex}&orderBy=relevance`;
                
                const res = await fetch(url);
                if (!res.ok) throw new Error(`API Error: ${res.status}`);
                
                const data = await res.json();
                
                if (!data.items || data.items.length === 0) {
                    log(`   -> データ切れ (startIndex:${startIndex})`);
                    break; // これ以上ないならループ抜ける
                }

                let addedCount = 0;
                let skipCount = 0;

                for (const item of data.items) {
                    const info = item.volumeInfo;
                    if (!info.title) continue;

                    const docRef = doc(db, "books", item.id);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        skipCount++;
                        continue;
                    }

                    // 保存データ構築
                    const saveData = {
                        title: info.title,
                        authors: info.authors || ["著者不明"],
                        description: info.description || "",
                        image: info.imageLinks?.thumbnail || "",
                        categories: info.categories || [],
                        mainGenre: target.main, // 検索ターゲットの大ジャンルを仮設定
                        subGenres: [], // 後で修復ツールで一括設定するが、検索意図は持っておきたい
                        targetGenres: [],
                        score: getRandomScore(),
                        raw_score: 0,
                        searchKey: info.title.toLowerCase().replace(/\s+/g, ""),
                        lastUpdated: serverTimestamp()
                    };

                    await setDoc(docRef, saveData);
                    addedCount++;
                    totalNewBooks++;
                }
                
                log(`   -> 追加: ${addedCount}冊 / スキップ(重複): ${skipCount}冊`);
                
                // APIレート制限回避のための待機 (重要)
                await new Promise(r => setTimeout(r, 800)); 

            } catch (e) {
                log(`   -> エラー: ${e.message}`, "error");
                // エラーが出ても次のジャンルへ進む
            }
        }
    }

    updateProgress(GENRE_TARGETS.length, GENRE_TARGETS.length);
    log("==============================");
    log(`🎉 全処理完了！ 合計 ${totalNewBooks} 冊の新規本を入荷しました。`);
    log(`⚠️ 重要: 次に「データ修復ツール(admin_subgenre_fix.html)」を実行して、タグ情報を確定させてください。`);
    
    btn.textContent = "完了しました";
});
</script>
</body>
</html>
