<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>【最終解決】出版日修復ツール（APIキー認証版）</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        button { padding: 15px 30px; font-size: 16px; cursor: pointer; font-weight: bold; border-radius: 5px; border: none; }
        #btn-check { background-color: #8e44ad; color: white; }
        #btn-update { background-color: #27ae60; color: white; display: none; margin-top: 20px; }
        #log { margin-top: 20px; background: #222; color: #eee; padding: 15px; height: 500px; overflow-y: scroll; font-family: monospace; font-size: 12px; }
        
        .log-success { color: #2ecc71; }
        .log-match { color: #3498db; font-weight: bold; }
        .log-error { color: #e74c3c; }
        input { padding: 10px; width: 300px; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📅 出版日修復ツール（APIキー認証版）</h2>
        <p>
            Google Cloud Consoleで「Google Books API」を有効にしてから実行してください。<br>
            認証を通すことで、制限にかかることなく高速に処理できます。
        </p>

        <div>
            <label>APIキーを入力 (FirebaseのapiKeyと同じでOK):</label><br>
            <input type="text" id="apiKeyInput" placeholder="AIzaSy...">
        </div>
        <br>
        
        <button id="btn-check">データ取得を開始</button>
        <button id="btn-update">取得したデータを保存する</button>

        <div id="log">待機中...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, writeBatch, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ▼ここにFirebase設定を貼り付けてください
        const firebaseConfig = {
            apiKey: "AIzaSyD8NPDFZcumM96ypgJOLSm5BA0I2wTBaKg",
            authDomain: "book-ree.firebaseapp.com",
            projectId: "book-ree",
            storageBucket: "book-ree.firebasestorage.app",
            messagingSenderId: "721168073032",
            appId: "1:721168073032:web:9d46233bd8b0d11b73f37d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let pendingUpdates = [];
        const logDiv = document.getElementById("log");

        function log(msg, type = "") {
            const div = document.createElement("div");
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            if(type) div.className = type;
            logDiv.appendChild(div);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function fetchWithKey(title, authors, apiKey) {
            let query = title;
            if (authors && authors.length > 0) {
                query += ` ${authors[0]}`;
            }
            // APIキーを付与してリクエスト（これで制限解除）
            const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&key=${apiKey}&maxResults=1`;

            try {
                const res = await fetch(url);
                if (!res.ok) {
                    if (res.status === 403) {
                        log("❌ 403エラー: Google Cloud Consoleで「Google Books API」が有効になっていません。", "log-error");
                        return null;
                    }
                    if (res.status === 429) {
                        log("⚠️ 429エラー: 少し待機します...", "log-error");
                        await delay(2000);
                        return fetchWithKey(title, authors, apiKey);
                    }
                    return null;
                }

                const data = await res.json();
                if (data.items && data.items.length > 0) {
                    return data.items[0].volumeInfo;
                }
                return null;
            } catch (e) {
                console.error(e);
                return null;
            }
        }

        document.getElementById("btn-check").addEventListener("click", async () => {
            const apiKey = document.getElementById("apiKeyInput").value.trim();
            if (!apiKey) {
                alert("APIキーを入力してください！");
                return;
            }

            const btn = document.getElementById("btn-check");
            btn.disabled = true;

            log("データベース読み込み中...", "");
            const snapshot = await getDocs(collection(db, "books"));
            
            const targetDocs = [];
            snapshot.forEach(d => {
                const data = d.data();
                if (!data.publishedDate || !data.publishedYear) {
                    targetDocs.push({ 
                        id: d.id, 
                        title: data.title, 
                        authors: data.authors 
                    });
                }
            });

            log(`残り ${targetDocs.length} 件の出版日を取得します。`, "log-success");

            for (let i = 0; i < targetDocs.length; i++) {
                const item = targetDocs[i];
                
                // APIキーを使って取得
                const info = await fetchWithKey(item.title, item.authors, apiKey);

                if (info && info.publishedDate) {
                    const pDate = info.publishedDate;
                    const pYear = parseInt(pDate.substring(0, 4));
                    
                    if (!isNaN(pYear)) {
                        pendingUpdates.push({
                            id: item.id,
                            title: item.title,
                            publishedDate: pDate,
                            publishedYear: pYear
                        });
                        log(`[${i+1}/${targetDocs.length}] OK: ${item.title.substring(0,10)}... -> ${pDate}`, "log-match");
                    }
                } else {
                    log(`[${i+1}/${targetDocs.length}] Skip: ${item.title.substring(0,10)}...`, "");
                }

                // APIキーがあれば待機時間はほぼ不要だが、念のため0.2秒だけ待つ
                await delay(200);

                if (pendingUpdates.length > 0 && pendingUpdates.length % 50 === 0) {
                    const btnUpdate = document.getElementById("btn-update");
                    btnUpdate.style.display = "inline-block";
                    btnUpdate.textContent = `現在 ${pendingUpdates.length} 件を保存可能（クリックで実行）`;
                }
            }

            log("全処理終了。", "log-success");
            const btnUpdate = document.getElementById("btn-update");
            btnUpdate.style.display = "inline-block";
            btnUpdate.textContent = `${pendingUpdates.length} 件のデータを確定保存する`;
        });

        document.getElementById("btn-update").addEventListener("click", async () => {
            if (!confirm(`${pendingUpdates.length} 件のデータを保存しますか？`)) return;
            
            log("保存中...", "");
            const batchSize = 400;
            for (let i = 0; i < pendingUpdates.length; i += batchSize) {
                const batch = writeBatch(db);
                const chunk = pendingUpdates.slice(i, i + batchSize);
                chunk.forEach(d => {
                    const ref = doc(db, "books", d.id);
                    batch.update(ref, {
                        publishedDate: d.publishedDate,
                        publishedYear: d.publishedYear
                    });
                });
                await batch.commit();
            }
            alert("完了しました！");
        });
    </script>
</body>
</html>
