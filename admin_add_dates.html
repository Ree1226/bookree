<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>【強力版】出版日データ取得・付与ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-right: 10px; }
        #btn-update { background-color: #e74c3c; color: white; border: none; display: none; }
        #log { margin-top: 20px; background: #222; color: #eee; padding: 15px; height: 500px; overflow-y: scroll; font-family: monospace; font-size: 12px; }
        .change { color: #ffff00; } 
        .error { color: #ff5555; }
        .retry { color: #ffaa00; font-weight: bold; } /* リトライ用オレンジ */
        .success { color: #00ff00; } 
        .no-change { color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📅 【強力版】出版日データ取得・付与ツール</h2>
        <p>Google Books API の制限（429エラー）を自動検知し、<br>
        休憩しながら確実にデータを取得します。</p>
        
        <button id="btn-check">全データの出版日を取得（API照会）</button>
        <button id="btn-update">データベースに反映する</button>

        <div id="log">ログ待機中...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, writeBatch, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ▼ここにFirebase設定を貼り付けてください
        const firebaseConfig = {
            apiKey: "AIzaSyD8NPDFZcumM96ypgJOLSm5BA0I2wTBaKg",
            authDomain: "book-ree.firebaseapp.com",
            projectId: "book-ree",
            storageBucket: "book-ree.firebasestorage.app",
            messagingSenderId: "721168073032",
            appId: "1:721168073032:web:9d46233bd8b0d11b73f37d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let pendingUpdates = [];

        const logDiv = document.getElementById("log");
        function log(msg, type = "normal") {
            const div = document.createElement("div");
            div.textContent = msg;
            if (type) div.className = type;
            logDiv.appendChild(div);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        const delay = ms => new Promise(res => setTimeout(res, ms));

        document.getElementById("btn-check").addEventListener("click", async () => {
            log("まずは全データのIDを取得します...", "normal");
            pendingUpdates = [];
            
            const snapshot = await getDocs(collection(db, "books"));
            const docs = snapshot.docs;
            log(`取得完了: ${docs.length}件のデータが見つかりました。API照会を開始します...`, "normal");

            // ループ処理
            for (let i = 0; i < docs.length; i++) {
                const docSnap = docs[i];
                const data = docSnap.data();
                const bookId = docSnap.id;

                if (i % 10 === 0) log(`進捗: ${i} / ${docs.length} 件目...`, "no-change");

                // すでにデータがある場合はスキップ（時間短縮）
                if (data.publishedYear && data.publishedDate) {
                    continue; 
                }

                let success = false;
                let retryCount = 0;

                // 成功するまでリトライするループ
                while (!success && retryCount < 5) {
                    try {
                        // 通常待機：2秒（ゆっくり確実に）
                        await delay(2000); 

                        const response = await fetch(`https://www.googleapis.com/books/v1/volumes/${bookId}`);
                        
                        // 429エラー（アクセス過多）の場合
                        if (response.status === 429) {
                            log(`⚠️ アクセス制限検知 (429)。20秒休憩します...`, "retry");
                            await delay(20000); // 20秒待機
                            retryCount++;
                            log(`🔄 リトライ中... (${retryCount}回目)`, "retry");
                            continue; // whileループの先頭に戻って再挑戦
                        }

                        if (!response.ok) {
                            // 404などの通常エラーはスキップ
                            log(`[エラー] API取得失敗 ID: ${bookId} Status: ${response.status}`, "error");
                            break; // whileループを抜ける
                        }

                        const json = await response.json();
                        const info = json.volumeInfo;

                        if (info && info.publishedDate) {
                            const pDate = info.publishedDate;
                            let pYear = null;
                            const yearMatch = pDate.match(/^(\d{4})/);
                            if (yearMatch) pYear = parseInt(yearMatch[1], 10);

                            // 変更リストに追加
                            if (data.publishedDate !== pDate || data.publishedYear !== pYear) {
                                pendingUpdates.push({
                                    id: bookId,
                                    title: data.title,
                                    publishedDate: pDate,
                                    publishedYear: pYear
                                });
                                log(`[取得OK] ${data.title.substring(0, 15)}... -> ${pDate}`, "change");
                            }
                        }
                        success = true; // 成功したのでwhileを抜ける

                    } catch (e) {
                        log(`[例外] ${e.message}`, "error");
                        break;
                    }
                }
            }

            if (pendingUpdates.length > 0) {
                log(`\n-----------------------------------`, "normal");
                log(`合計 ${pendingUpdates.length} 件のデータ更新が必要です。`, "success");
                log(`下の「データベースに反映する」ボタンを押してください。`, "success");
                document.getElementById("btn-update").style.display = "inline-block";
            } else {
                log("\nすべてのデータは最新の状態です。", "success");
            }
        });

        document.getElementById("btn-update").addEventListener("click", async () => {
            if (!confirm(`${pendingUpdates.length} 件のデータに出版日を付与しますか？`)) return;

            log("更新書き込みを開始します...", "normal");
            const batchSize = 400; // 安全のため少し減らす
            
            for (let i = 0; i < pendingUpdates.length; i += batchSize) {
                const batch = writeBatch(db);
                const chunk = pendingUpdates.slice(i, i + batchSize);
                
                chunk.forEach(item => {
                    const ref = doc(db, "books", item.id);
                    batch.update(ref, {
                        publishedDate: item.publishedDate,
                        publishedYear: item.publishedYear
                    });
                });

                await batch.commit();
                log(`${Math.min(i + batchSize, pendingUpdates.length)} / ${pendingUpdates.length} 件 書き込み完了`, "success");
                await delay(1000); // 書き込み毎にも少し休憩
            }
            log("全完了！すべての本に出版日が記録されました。", "success");
        });
    </script>
</body>
</html>
