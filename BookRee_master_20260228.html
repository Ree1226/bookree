<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>BookRee Master</title>
    <!-- Chart.js を追加 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; --success: #27ae60; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: #f4f7f6; margin: 0; color: #333; }
        
        /* ログイン画面 */
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #2c3e50; z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #login-box { background: white; padding: 40px; border-radius: 8px; text-align: center; width: 300px; }
        #login-box input { width: 100%; padding: 10px; margin: 10px 0; font-size: 16px; box-sizing: border-box; }
        #login-box button { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; font-size: 16px; cursor: pointer; }

        /* メイン画面 */
        #app { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h1 { margin: 0; font-size: 24px; color: var(--primary); }
        
        /* ダッシュボード */
        .dashboard-stats { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; gap: 20px; flex-wrap: wrap; }
        
        .toolbar { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input.search-box { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
        
        button.btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-search { background: var(--accent); }
        .btn-success { background-color: #27ae60; color: white;}
        .btn-success:hover { background-color: #219150;}

        .btn-fix { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn:hover { opacity: 0.9; }

        /* テーブル */
        .table-container { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: bold; color: #555; }
        tr:hover { background: #f1f1f1; }
        
        .thumb { width: 40px; height: 50px; object-fit: cover; border-radius: 2px; background: #eee; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 12px; color: white; margin-right: 4px; }
        .bg-study { background: #9b59b6; }
        .bg-lit { background: #e67e22; }
        .bg-target { background: #34495e; }
        .bg-sub { background: #16a085; } /* 新しく追加：小ジャンル用の緑色 */

        .actions { display: flex; gap: 5px; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }

        /* 編集モーダル */
        #edit-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: white; width: 500px; margin: 50px auto; padding: 30px; border-radius: 8px; position: relative; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .close-btn { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; color: #999; }

        /* 追加：除外された行のスタイル */
        .row-excluded {
            opacity: 0.4; /* かなり薄くする */
            background-color: #f8f9fa !important;
        }
        .row-excluded img {
            filter: grayscale(100%); /* 画像も白黒に */
        }

        /* 追加：除外・復帰ボタンのスタイル */
        .btn-exclude { background-color: #95a5a6; color: white; } /* 除外ボタン（グレー） */
        .btn-include { background-color: #2ecc71; color: white; } /* 復帰ボタン（緑） */

    </style>

    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>

<!-- ログイン -->

<!-- メインアプリ -->

            </optgroup>
            <optgroup label="趣味・実用">

                <option value="health">健康</option>
                <option value="beauty">美容</option>
                <option value="manners">冠婚葬祭・マナー</option>
                <option value="travel">旅行</option>
                <option value="gardening">園芸</option>
                <option value="sports">スポーツ</option>
                <option value="camera">カメラ</option>
                <option value="railway">鉄道</option>
                <option value="igo_shogi">将棋・囲碁</option>
            </optgroup>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { 
        getFirestore, collection, doc, getDoc, getDocs, updateDoc, deleteDoc, setDoc, serverTimestamp,
        query, where, orderBy, limit, startAfter, getCountFromServer
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
            apiKey: "AIzaSyD8NPDFZcumM96ypgJOLSm5BA0I2wTBaKg",
            authDomain: "book-ree.firebaseapp.com",
            projectId: "book-ree",
            storageBucket: "book-ree.firebasestorage.app",
            messagingSenderId: "721168073032",
            appId: "1:721168073032:web:9d46233bd8b0d11b73f37d"
        };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // グローバル変数
    window.db = db;
    let lastDoc = null;
    let currentBooks = [];

    // --- ログイン状態を監視 ---
    onAuthStateChanged(auth, (user) => {
        const loginOverlay = document.getElementById("login-overlay");
        const appElement = document.getElementById("app");

        // 特定のメールアドレスチェックを削除し、「ログインしているか」だけで判定
        if (user) {
            // ログイン成功
            loginOverlay.style.display = "none";
            appElement.style.display = "block";
            
            // ログインに成功してからデータを読み込む
            runSearch(); 
            loadStats();
            loadInventoryStats();
            loadTrendBoard();
        } else {
            // 未ログイン
            loginOverlay.style.display = "flex"; // flexに戻す
            appElement.style.display = "none";
        }
    });

    // --- ログイン実行関数 ---
    window.checkPass = () => {
        // 入力フォームからメールアドレスとパスワードを取得
        const email = document.getElementById("admin-email").value;
        const pass = document.getElementById("admin-pass").value;

        if (!email || !pass) {
            alert("メールアドレスとパスワードを入力してください");
            return;
        }

        // Firebaseの認証機能を使ってログイン
        signInWithEmailAndPassword(auth, email, pass)
            .then(() => {
                console.log("ログイン成功");
            })
            .catch((error) => {
                console.error("ログインエラー:", error.code);
                document.getElementById("login-msg").textContent = "認証に失敗しました。入力内容を確認してください。";
            });
    };

    // 画像URLを安全なHTTPSに変換する共通関数
    function getSecureImageUrl(url) {
        if (!url) return "";
        return url.replace("http://", "https://");
    }

    // --- データ取得（検索ロジック：前方一致・省エネ確定版） ---
    window.runSearch = async (isMore = false) => {
        const keyword = document.getElementById("search-input").value.trim();
        const listEl = document.getElementById("book-list");
        
        if (!isMore) {
            listEl.innerHTML = "";
            lastDoc = null;
            currentBooks = [];
        }

        const constraints = [];
        const booksRef = collection(db, "books");

        if (keyword) {
            // ① IDとして直接検索してみる（コスト1回）
            if(keyword.length > 5 && !keyword.includes(" ")) {
                 try {
                     const d = await getDoc(doc(db, "books", keyword));
                     if(d.exists()) {
                         const book = {id:d.id, ...d.data()};
                         currentBooks = [book];
                         renderRows(currentBooks);
                         document.getElementById("status-bar").textContent = `ID検索ヒット: 1件`;
                         return; 
                     }
                 } catch(e) {}
            }

            // ② タイトル前方一致検索（コスト＝ヒット数のみ）
            // ※「タイトルの最初」から入力する必要があります
            constraints.push(where("title", ">=", keyword));
            constraints.push(where("title", "<=", keyword + "\uf8ff"));
            
            // 前方一致検索時はタイトルの辞書順になります
            constraints.push(orderBy("title"));
            constraints.push(limit(20)); 

        } else {
            // キーワードなし（通常表示）は「更新順」
            constraints.push(orderBy("lastUpdated", "desc"));
            constraints.push(limit(20));
            if (lastDoc) constraints.push(startAfter(lastDoc));
        }

        try {
            const q = query(booksRef, ...constraints);
            const snapshot = await getDocs(q);
            
            if (!snapshot.empty) {
                lastDoc = snapshot.docs[snapshot.docs.length - 1];
            }

            const books = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

            // 検索結果が0件の場合のヒント（アラートではなくログのみ）
            if (keyword && books.length === 0) {

                dateStr = `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;

            let targetBadges = "";
            if(b.target && Array.isArray(b.target)) {
                targetBadges = b.target.map(t => `<span class="badge bg-target">${t}</span>`).join("");

            let subBadges = "";        
            if(b.subGenres && Array.isArray(b.subGenres)) {

                subBadges = b.subGenres.map(s => `<span class="badge bg-sub">${s}</span>`).join("");

    // サブジャンルのチェックボックスを再描画する関数
    function updateSubGenreCheckboxes(mainGenre, targetArray = [], currentSubs = []) {
        const container = document.getElementById("edit-subGenres-container");
        container.innerHTML = "";
        
        // 基本的には大ジャンル名をキーにする
        let genreKey = mainGenre;

        // 大ジャンルが「学習参考書(study)」の場合のみ、ターゲットに応じてキーを切り替える
        if (mainGenre === 'study') {
            if (targetArray.includes('high_school')) {
                genreKey = 'highschool';
            } else if (targetArray.includes('junior_high')) {
                genreKey = 'juniorhigh';
            } else if (targetArray.includes('elementary')) {
                genreKey = 'elementary';
            } else {
                // 幼児(infant)、大学生・一般(univ_general)、または未選択の場合
                genreKey = 'study'; 
            }
        }

        // マスターデータから該当するリストを取得（存在しない場合は other）
        const options = SUBGENRE_MASTER[genreKey] || SUBGENRE_MASTER.other;

        // チェックボックスの描画
        options.forEach(opt => {
            const isChecked = currentSubs.includes(opt.id) ? "checked" : "";
            const itemHtml = `
                <label style="font-weight:normal; font-size:13px; cursor:pointer; display:flex; align-items:center; gap:8px; white-space:nowrap;">
                    <input type="checkbox" name="subgenre-check" value="${opt.id}" ${isChecked} style="margin:0; width:16px; height:16px;">
                    <span>${opt.label}</span>
                </label>
            `;
            container.insertAdjacentHTML('beforeend', itemHtml);
        });
    }

    async function fetchOpenBD(isbn) {
        if (!isbn) return null;
        try {
            const cleanIsbn = isbn.replace(/[^0-9X]/g, '');
            const res = await fetch(`https://api.openbd.jp/v1/get?isbn=${cleanIsbn}`);
            const json = await res.json();
            return json && json[0] ? json[0] : null;
        } catch (e) { return null; }
    }

    function determineSmartGenreV6(openBdData, title) {
        let cCode = null;
        let target = ['general']; 
        let mainGenre = 'general';

        if (openBdData && openBdData.summary && openBdData.summary.c_code) {
            cCode = openBdData.summary.c_code;
        }
        if (!cCode && openBdData && openBdData.onix?.DescriptiveDetail?.ProductClassification) {
            const pc = openBdData.onix.DescriptiveDetail.ProductClassification;
            const found = pc.find(x => x.ProductClassificationType === '04');
            if (found) cCode = found.ProductClassificationCode;
        }

        if (cCode) {
            const first = cCode.charAt(0);
            const second = cCode.charAt(1);
            if (first === '6' || first === '7') mainGenre = 'study';
            else if (first === '8') mainGenre = 'children';
            else if (first === '2') mainGenre = 'hobby';
            else if (first === '1' || first === '9') mainGenre = 'literature';
            else if (first === '3') mainGenre = 'business';
            else if (first === '4' || first === '5') mainGenre = 'specialized';
            
            switch (second) {
                case '1': target = ['general', 'university']; break;
                case '2': target = ['elementary']; break;
                case '3': target = ['junior_high']; break;
                case '4': target = ['high_school']; break;
                case '5': target = ['university', 'general']; break;
                default: target = ['general'];
            }
        }

        const text = (title || "").toLowerCase();
        
        if (HS_KEYWORDS.some(k => text.includes(k.toLowerCase()))) {
            return { target: ['high_school'], genre: 'study', cCode };
        }
        if (text.includes("中学") || text.includes("高校入試")) {
            return { target: ['junior_high'], genre: 'study', cCode };
        }
        if (text.includes("小学") || text.includes("中学入試") || text.includes("絵本") || text.includes("図鑑")) {
            if (text.includes("入試") || text.includes("受験") || text.includes("ドリル")) {
                return { target: ['elementary'], genre: 'study', cCode };
            }
            return { target: ['elementary'], genre: 'children', cCode };
        }

        if (cCode) return { target, genre: mainGenre, cCode }; 
        return null;
    }

    // --- 統計データ読み込み機能（新・日別対応版） ---
    window.loadStats = async () => {
        try {
            // 1. 累計PVの取得 (stats/global)
            const totalRef = doc(db, "stats", "global");
            const totalSnap = await getDoc(totalRef);
            // フィールド名も count ではなく page_views に戻ります
            const totalPV = totalSnap.exists() ? (totalSnap.data().page_views || 0) : 0;
            document.getElementById("stat-pv").textContent = totalPV.toLocaleString();

            // 2. 日別データの取得 (daily_stats を日付降順で最新7件)
            const dailyRef = collection(db, "daily_stats");
            const q = query(dailyRef, orderBy("date", "desc"), limit(14)); // 比較用に少し多めに取得
            const dailySnaps = await getDocs(q);
            
            const dailyData = dailySnaps.docs.map(d => d.data()); // [{date: "2026-01-29", pv: 10}, ...]

            // 昨日の日付文字列を作成 (YYYY-MM-DD)
            const d = new Date();
            d.setDate(d.getDate() - 1); // 1日前
            const yYear = d.getFullYear();
            const yMonth = ('0' + (d.getMonth() + 1)).slice(-2);
            const yDay = ('0' + d.getDate()).slice(-2);
            const yesterdayStr = `${yYear}-${yMonth}-${yDay}`;

            // 昨日のPVを探して表示
            const yesterdayData = dailyData.find(item => item.date === yesterdayStr);
            const yesterdayPV = yesterdayData ? yesterdayData.pv : 0;
            document.getElementById("stat-yesterday").textContent = yesterdayPV.toLocaleString();

            // おとといと比較して増減を表示
            d.setDate(d.getDate() - 1); // さらに1日前
            const dayBeforeStr = `${d.getFullYear()}-${('0' + (d.getMonth() + 1)).slice(-2)}-${('0' + d.getDate()).slice(-2)}`;
            const dayBeforeData = dailyData.find(item => item.date === dayBeforeStr);
            const dayBeforePV = dayBeforeData ? dayBeforeData.pv : 0;

            const diffEl = document.getElementById("stat-diff");
            if (yesterdayPV > dayBeforePV) {
                diffEl.innerHTML = `<span style="color:#e74c3c;">▲ ${yesterdayPV - dayBeforePV}</span>`;
            } else if (yesterdayPV < dayBeforePV) {
                diffEl.innerHTML = `<span style="color:#3498db;">▼ ${dayBeforePV - yesterdayPV}</span>`;
            } else {
                diffEl.textContent = "±0";
            }

            // --- グラフ描画 (Chart.js) ---
            // 修正版：過去7日分の日付を自動生成し、データがない日は「0」で埋める処理
            
            const chartLabels = [];
            const chartValues = [];
            
            // 今日を基準に過去7日分ループする (6日前 ～ 0日前)
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                
                // DBのキー形式 (YYYY-MM-DD) を作成
                // ※日本時間(JST)を考慮する場合、簡易的に以下のようにします
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                const dateKey = `${year}-${month}-${day}`;
                
                // グラフのラベル用 (MM-DD)
                chartLabels.push(`${month}-${day}`);
                
                // その日のデータが dailyData にあるか探す
                const found = dailyData.find(item => item.date === dateKey);
                chartValues.push(found ? found.pv : 0); // なければ 0
            }
            
            const ctx = document.getElementById('pvChart');
            
            // 既存のグラフがあれば破棄して再描画（表示崩れ防止）
            if (window.myChartInstance) {
                window.myChartInstance.destroy();
            }

            if (ctx && window.Chart) {
                // グラフインスタンスを変数に保存しておく
                window.myChartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: chartLabels, // 生成した日付リスト
                        datasets: [{
                            label: 'Access',
                            data: chartValues, // 生成した数値リスト
                            borderColor: '#3498db',
                            backgroundColor: 'rgba(52, 152, 219, 0.1)',
                            borderWidth: 2,
                            tension: 0.3,
                            fill: true,
                            pointRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { beginAtZero: true, suggestedMax: 5 }, // 数値が小さくても見やすく
                            x: { grid: { display:false } }
                        }
                    }
                });
            }
            
            // 3. ジャンル別投票データの取得 (後方互換用: stats/global)
            // ※注意: 新しいシステムでは「投票」時の累計集計を行っていない場合、ここの更新は止まります。
            // 必要に応じてジャンル集計ロジックも main.js に追加する必要があります。
            const globalRef = doc(db, "stats", "global");
            const globalSnap = await getDoc(globalRef);

            if (globalSnap.exists()) {
                const gData = globalSnap.data();
                const genres = [];
                const labelMap = { study: "学習参考書", literature: "文芸", business: "ビジネス", specialized: "専門書", hobby: "趣味", children: "児童書", other: "その他" };
                
                for (const key in gData) {
                    if (key.startsWith("vote_")) {
                        genres.push({ name: labelMap[key.replace("vote_", "")] || key, count: gData[key] });
                    }
                }
                genres.sort((a, b) => b.count - a.count);
                
                // HTML生成
                const html = genres.map((g, i) => {
                    const pct = genres[0].count ? (g.count / genres[0].count * 100) : 0;
                    return `<div style="display:flex; align-items:center; font-size:12px;">
                        <div style="width:70px; text-align:right; margin-right:8px; white-space:nowrap; overflow:hidden;">${g.name}</div>
                        <div style="flex:1; background:#f0f0f0; height:8px; border-radius:4px; overflow:hidden;">
                            <div style="background:${i<3?'#3498db':'#bdc3c7'}; width:${pct}%; height:100%;"></div>
                        </div>
                        <div style="width:30px; text-align:right; color:#666;">${g.count}</div>
                    </div>`;
                }).join("");
                document.getElementById("stat-genres").innerHTML = html || "<div style='color:#ccc;'>No Data</div>";
            }

        } catch (e) {
            console.error("統計読み込みエラー", e);
            document.getElementById("stat-pv").textContent = "Err";
        }
    };

    // ▼▼▼ C-1. 蔵書数集計機能 (通信詰まり防止のため順番に取得) ▼▼▼
    window.loadInventoryStats = async () => {
        const btn = document.getElementById('refresh-inv-btn');
        const grid = document.getElementById('inv-grid');
        const totalEl = document.getElementById('inv-total');
        
        if(btn) { btn.disabled = true; btn.textContent = "集計中..."; }
        
        const GENRES = {
            business: { label: "ビジネス", color: "#e0f2fe", text: "#0369a1" },
            literature: { label: "文芸", color: "#fce7f3", text: "#be185d" },
            hobby: { label: "趣味", color: "#dcfce7", text: "#15803d" },
            specialized: { label: "専門書", color: "#f3e8ff", text: "#7e22ce" },
            children: { label: "児童書", color: "#ffedd5", text: "#c2410c" },
            study: { label: "学習参考書", color: "#fef9c3", text: "#a16207" },
            other: { label: "その他", color: "#f1f5f9", text: "#475569" }
        };

        try {
            // グリッドを一旦クリア
            grid.innerHTML = "";
            let total = 0;
            const results = [];

            // ★変更点：負荷軽減のため、Promise.allではなくループで1つずつ順番に処理する
            for (const key of Object.keys(GENRES)) {
                try {
                    const q = query(collection(db, "books"), where("mainGenre", "==", key));
                    const snap = await getCountFromServer(q);
                    const count = snap.data().count;
                    
                    results.push({ key, count });
                    total += count;
                } catch (err) {
                    console.warn(`ジャンル(${key})の取得に失敗:`, err);
                }
            }
            
            // 多い順に並べ替え
            results.sort((a,b) => b.count - a.count);

            // 描画
            results.forEach(r => {
                const info = GENRES[r.key] || GENRES.other;
                const el = document.createElement("div");
                el.style.cssText = `background:${info.color}; color:${info.text}; padding:10px 15px; border-radius:6px; text-align:center; min-width:80px; flex:1;`;
                el.innerHTML = `
                    <div style="font-size:11px; margin-bottom:2px;">${info.label}</div>
                    <div style="font-size:16px; font-weight:bold;">${r.count.toLocaleString()}</div>
                `;
                grid.appendChild(el);
            });
            
            totalEl.textContent = total.toLocaleString();

        } catch(e) {
            console.error("Inventory stats error:", e);
            grid.innerHTML = "<span style='color:red;'>集計エラー</span>";
        } finally {
            if(btn) { btn.disabled = false; btn.textContent = "🔄 更新"; }
        }
    };

    // --- 追加：ランキング除外切り替え機能 ---
    window.toggleExclusion = async (id) => {
        const book = currentBooks.find(b => b.id === id);
        if (!book) return;

        const currentStatus = book.isExcluded || false;
        const newStatus = !currentStatus;
        const actionText = newStatus ? "ランキングから除外" : "ランキングに復帰";

        if (!confirm(`「${book.title}」を${actionText}させますか？`)) return;

        try {
            const bookRef = doc(db, "books", id);
            await updateDoc(bookRef, {
                isExcluded: newStatus,
                lastUpdated: serverTimestamp() // 更新日時も記録
            });

            // ローカルデータの更新
            book.isExcluded = newStatus;

            // UIの即時更新
            const tr = document.getElementById(`row-${id}`);
            if (tr) {
                if (newStatus) {
                    tr.classList.add("row-excluded");
                } else {
                    tr.classList.remove("row-excluded");
                }
                // ボタンのテキストと色を更新
                const btn = tr.querySelector("button[onclick^='toggleExclusion']");
                if (btn) {
                    btn.textContent = newStatus ? "復帰" : "除外";
                    btn.className = `btn btn-sm ${newStatus ? 'btn-include' : 'btn-danger'}`;
                }
            }

            console.log(`${book.title} を ${newStatus ? '除外' : '復帰'} しました`);
        } catch (e) {
            console.error("除外設定エラー:", e);
            alert("エラーが発生しました: " + e.message);
        }
    };

    // --- トレンド分析ボードの集計と表示 ---
    window.loadTrendBoard = async () => {
        const trendGrid = document.getElementById('trend-grid');
        trendGrid.innerHTML = "<div style='grid-column: 1/-1; text-align:center; color:#999;'>トレンドデータを集計中...</div>";

        const sevenDaysAgo = new Date();
        sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

        // ジャンル設定（既存の loadInventoryStats と統一）
        const GENRES = {
            literature: { name: "文芸", color: "#fce7f3" },
            business: { name: "経済・ビジネス", color: "#e0f2fe" },
            hobby: { name: "趣味・実用", color: "#dcfce7" },
            specialized: { name: "専門書", color: "#f3e8ff" },
            children: { name: "児童書", color: "#ffedd5" },
            study: { name: "学習参考書", color: "#fef9c3" }
        };

        try {
            // 1. 過去7日間の投票ログを取得
            const logsRef = collection(db, "vote_logs");
            const q = query(logsRef, where("timestamp", ">=", sevenDaysAgo));
            const querySnapshot = await getDocs(q);

            // 2. データを集計 { genre: { bookId: { title, points } } }
            const aggregation = {};
            querySnapshot.forEach(doc => {
                const data = doc.data();
                const { mainGenre, bookId, title, points } = data;
                
                if (!aggregation[mainGenre]) aggregation[mainGenre] = {};
                if (!aggregation[mainGenre][bookId]) {
                    aggregation[mainGenre][bookId] = { title: title, totalPoints: 0 };
                }
                aggregation[mainGenre][bookId].totalPoints += points;
            });

            trendGrid.innerHTML = ""; // クリア

            // 3. 各ジャンルごとにTOP3を表示
            Object.keys(GENRES).forEach(genreId => {
                const genreInfo = GENRES[genreId];
                const booksInGenre = aggregation[genreId] || {};
                
                // スコア順にソートしてTOP3を抽出
                const sortedBooks = Object.entries(booksInGenre)
                    .map(([id, data]) => ({ id, ...data }))
                    .sort((a, b) => b.totalPoints - a.totalPoints)
                    .slice(0, 3);

                // カードの生成
                const card = document.createElement('div');
                card.style = `background: ${genreInfo.color}; padding: 15px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column;`;
                
                let booksHtml = sortedBooks.length > 0 
                    ? sortedBooks.map((b, i) => `
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:12px; background:#fff; padding:8px; border-radius:5px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                            <div style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-right:5px;">
                                <span style="font-weight:bold; color:#777;">${i+1}.</span> ${b.title}
                            </div>
                            <span style="color:#e67e22; font-weight:bold; font-size:11px;">+${b.totalPoints}pt</span>
                        </div>`).join('')
                    : '<p style="font-size:12px; color:#888; text-align:center; margin: 20px 0;">期間内の投票なし</p>';

                card.innerHTML = `
                    <h4 style="margin:0 0 12px 0; font-size:14px; color:#333; border-bottom:1px solid rgba(0,0,0,0.1); padding-bottom:5px; display:flex; justify-content:space-between;">
                        ${genreInfo.name}
                        <span style="font-size:10px; color:#666; font-weight:normal;">Weekly Top3</span>
                    </h4>
                    ${booksHtml}
                `;
                trendGrid.appendChild(card);
            });

        } catch (error) {
            console.error("Trend load error:", error);
            trendGrid.innerHTML = `<div style='grid-column: 1/-1; color:red;'>トレンドの読み込みに失敗しました: ${error.message}</div>`;
        }
    };
